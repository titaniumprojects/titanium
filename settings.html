<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Настройки</title>
    <style>
        body { background: #05050a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 100px; }
        .box { background: #0c0c14; padding: 30px; border-radius: 20px; border: 1px solid #1a1a2e; width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #1a1a2e; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #5f6eff; border: none; color: #fff; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .logout { margin-top: 20px; color: #ff4b4b; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="box">
        <h3>НАСТРОЙКИ</h3>
        <label>Новый пароль</label>
        <input type="password" id="new-p" placeholder="Введите пароль">
        <button class="btn" onclick="save()">СОХРАНИТЬ ПАРОЛЬ</button>
        <center><div class="logout" onclick="localStorage.clear(); location.href='login.html'">Выйти из аккаунта</div></center>
    </div>
    <script>
        const API = "https://new-bears-glow.loca.lt";
        async function save() {
            const p = document.getElementById('new-p').value;
            if(p.length < 4) return alert("Короткий!");
            const r = await fetch(`${API}/admin/update_password`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({username: localStorage.getItem('username'), password: p})
            });
            if(r.ok) alert("Успешно!");
        }
    </script>
</body>
</html>
