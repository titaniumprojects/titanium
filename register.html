<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Регистрация</title>
    <style>
        body { background: #05050a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #0c0c14; padding: 40px; border-radius: 20px; border: 1px solid #1a1a2e; text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a2e; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4caf50; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>REGISTRATION</h1>
        <input type="text" id="u" placeholder="Придумайте логин">
        <input type="password" id="p" placeholder="Придумайте пароль">
        <button onclick="doRegister()">СОЗДАТЬ АККАУНТ</button>
        <a href="login.html" style="color:#555; display:block; margin-top:15px; text-decoration:none;">Уже есть аккаунт? Войти</a>
    </div>

    <script>
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";

        async function doRegister() {
            const username = document.getElementById('u').value.trim();
            const password = document.getElementById('p').value.trim();

            const res = await fetch(`${API}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.status === "success") {
                alert("Успешно! Теперь войдите.");
                window.location.href = "login.html";
            } else {
                alert(data.message);
            }
        }
    </script>
</body>
</html>
