<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Регистрация</title>
    <style>
        :root { --bg: #05050a; --card: #0c0c14; --primary: #4caf50; --border: #1a1a2e; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--border); text-align: center; width: 320px; }
        h1 { color: var(--primary); margin-bottom: 25px; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a2e; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: var(--primary); border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 15px; }
        button:disabled { background: #333; }
        a { color: #555; text-decoration: none; font-size: 0.8rem; display: block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>JOIN US</h1>
        <input type="text" id="u" placeholder="Придумайте логин">
        <input type="password" id="p" placeholder="Придумайте пароль">
        <button id="regBtn" onclick="doRegister()">СОЗДАТЬ АККАУНТ</button>
        <a href="login.html">Уже есть аккаунт? Войти</a>
    </div>

    <script>
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";

        async function doRegister() {
            const u = document.getElementById('u').value.trim();
            const p = document.getElementById('p').value.trim();
            const btn = document.getElementById('regBtn');

            if (u.length < 3 || p.length < 4) return alert("Логин от 3, пароль от 4 символов!");

            btn.disabled = true;
            try {
                const res = await fetch(`${API}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (data.status === "success") {
                    alert("Успешно! Теперь войдите.");
                    window.location.href = "login.html";
                } else alert(data.message);
            } catch (e) { alert("Ошибка связи с сервером"); }
            btn.disabled = false;
        }
    </script>
</body>
</html>
