<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Регистрация</title>
    <style>
        body {
            background: #0a0f0a;
            color: #ccffcc;
            font-family: 'Segoe UI', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: #0e150e;
            border: 1px solid #2a4d2a;
            border-radius: 32px;
            padding: 40px;
            width: 340px;
            text-align: center;
        }
        h1 { color: #2ecc2e; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #0a0f0a;
            border: 1px solid #2a4d2a;
            color: #ccffcc;
            border-radius: 24px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2ecc2e;
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 15px;
        }
        a { color: #8bc48b; display: block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>РЕГИСТРАЦИЯ</h1>
        <input type="text" id="username" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <button id="regBtn">СОЗДАТЬ</button>
        <a href="login.html">Уже есть аккаунт? Войти</a>
    </div>

    <script>
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";

        document.getElementById('regBtn').onclick = async () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn = document.getElementById('regBtn');

            if (username.length < 3 || password.length < 4) {
                return alert("Логин (мин 3) и пароль (мин 4)");
            }

            btn.disabled = true;
            btn.innerText = "ОТПРАВКА...";

            try {
                const res = await fetch(`${API}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.status === "success") {
                    alert("Аккаунт создан!");
                    window.location.href = "login.html";
                } else {
                    alert(data.message || "Ошибка регистрации");
                }
            } catch (e) {
                alert("Сервер недоступен");
            } finally {
                btn.disabled = false;
                btn.innerText = "СОЗДАТЬ";
            }
        };
    </script>
</body>
</html>
