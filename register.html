<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITANIUM | Регистрация</title>
    <style>
        :root { --primary: #4caf50; --primary-hover: #45a049; --bg: #05050a; --card: #0c0c14; --border: #1a1a2e; }
        
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .card { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid var(--border); 
            text-align: center; 
            width: 320px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        h1 { color: var(--primary); margin-bottom: 25px; letter-spacing: 3px; font-weight: bold; }

        .input-group { margin-bottom: 15px; text-align: left; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            background: #1a1a2e; 
            border: 1px solid #333; 
            color: white; 
            border-radius: 8px; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(76, 175, 80, 0.2); }

        button { 
            width: 100%; 
            padding: 14px; 
            background: var(--primary); 
            border: none; 
            color: white; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 10px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover { background: var(--primary-hover); transform: translateY(-2px); }
        button:disabled { background: #333; cursor: not-allowed; transform: none; }

        .links { margin-top: 20px; }
        a { color: #888; text-decoration: none; font-size: 0.85rem; transition: 0.3s; }
        a:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="card">
        <h1>JOIN US</h1>
        
        <div class="input-group">
            <input type="text" id="u" placeholder="Логин (от 3 символов)">
        </div>
        
        <div class="input-group">
            <input type="password" id="p" placeholder="Пароль (от 4 символов)">
        </div>
        
        <button id="reg-btn" onclick="doRegister()">СОЗДАТЬ АККАУНТ</button>
        
        <div class="links">
            <a href="login.html">Уже есть аккаунт? Войти</a>
        </div>
    </div>

    <script>
        // ЗАМЕНИ ЭТУ ССЫЛКУ НА АКТУАЛЬНУЮ ИЗ NGROK
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";

        async function doRegister() {
            const uInput = document.getElementById('u');
            const pInput = document.getElementById('p');
            const btn = document.getElementById('reg-btn');

            const username = uInput.value.trim();
            const password = pInput.value.trim();

            // Валидация перед отправкой
            if (!username || !password) {
                return alert("Пожалуйста, заполните все поля!");
            }

            if (username.length < 3) {
                return alert("Логин слишком короткий (минимум 3 символа)!");
            }
            
            if (password.length < 4) {
                return alert("Пароль слишком простой (минимум 4 символа)!");
            }

            // Блокируем кнопку
            btn.disabled = true;
            btn.innerText = "РЕГИСТРАЦИЯ...";

            try {
                const res = await fetch(`${API}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: username, 
                        password: password 
                    })
                });
                
                const data = await res.json();

                if (data.status === "success") {
                    alert("Поздравляем! Аккаунт успешно создан.");
                    window.location.href = "login.html";
                } else {
                    alert(data.message || "Ошибка при регистрации");
                }
            } catch (e) {
                console.error(e);
                alert("Не удалось связаться с сервером. Убедитесь, что Python запущен и Ngrok работает.");
            } finally {
                // Разблокируем кнопку
                btn.disabled = false;
                btn.innerText = "СОЗДАТЬ АККАУНТ";
            }
        }

        // Позволяет регистрироваться нажатием на Enter
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') doRegister();
        });
    </script>

</body>
</html>
