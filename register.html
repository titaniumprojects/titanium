<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Регистрация</title>
    <style>
        body { background: #05050a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #0c0c14; padding: 40px; border-radius: 20px; border: 1px solid #1a1a2e; text-align: center; width: 320px; }
        h1 { color: #4caf50; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #161625; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: #4caf50; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .back { margin-top: 20px; display: block; color: #555; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>JOIN US</h1>
        <input type="text" id="u" placeholder="Придумайте логин">
        <input type="password" id="p" placeholder="Придумайте пароль">
        <button id="btn" onclick="doRegister()">СОЗДАТЬ АККАУНТ</button>
        <a href="login.html" class="back">Уже есть аккаунт? Войти</a>
    </div>

    <script src="config.js"></script>
    <script>
        async function doRegister() {
            const u = document.getElementById('u').value.trim();
            const p = document.getElementById('p').value.trim();
            const btn = document.getElementById('btn');

            if(u.length < 3 || p.length < 4) {
                return alert("Слишком короткий логин/пароль");
            }

            btn.disabled = true;
            try {
                const res = await fetch(`${API}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();

                if(data.status === "success") {
                    alert("Регистрация успешна!");
                    window.location.href = "login.html";
                } else {
                    alert(data.message);
                }
            } catch(e) {
                alert("Ошибка подключения к серверу");
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
