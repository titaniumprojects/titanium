<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Регистрация</title>
    <style>
        body { background: #05050a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #0c0c14; padding: 40px; border-radius: 20px; border: 1px solid #1a1a2e; text-align: center; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #4caf50; margin-bottom: 20px; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a2e; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #4caf50; }
        button { width: 100%; padding: 12px; background: #4caf50; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #45a049; transform: scale(1.02); }
        a { color: #555; text-decoration: none; font-size: 0.8rem; display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>REGISTRATION</h1>
        <input type="text" id="u" placeholder="Придумайте логин">
        <input type="password" id="p" placeholder="Придумайте пароль">
        <button onclick="doRegister()">СОЗДАТЬ АККАУНТ</button>
        <a href="login.html">Уже есть аккаунт? Войти</a>
    </div>

    <script>
        const API = "https://console.serveo.net";

        async function doRegister() {
            const username = document.getElementById('u').value.trim();
            const password = document.getElementById('p').value.trim();

            // ПРОВЕРКА 1: Чтобы не регались с пустыми полями
            if (!username || !password) {
                return alert("Логин и пароль не могут быть пустыми!");
            }

            if (username.length < 3) return alert("Логин слишком короткий!");

            try {
                const res = await fetch(`${API}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();

                if (data.status === "success") {
                    alert("Аккаунт успешно создан!");
                    window.location.href = "login.html";
                } else {
                    // ПРОВЕРКА 2: Тут сервер скажет "Этот логин занят"
                    alert(data.message || "Ошибка регистрации");
                }
            } catch (e) {
                alert("Сервер не отвечает. Проверь Ngrok!");
            }
        }
    </script>
</body>
</html>
