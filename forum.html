<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Forum</title>
    <style>
        body { background: #05050a; color: white; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .chat { width: 100%; max-width: 600px; height: 70vh; background: #0c0c14; border: 1px solid #1a1a2e; border-radius: 15px; display: flex; flex-direction: column; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; }
        .msg { background: #161625; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid #5f6eff; }
        .u { font-weight: bold; color: #5f6eff; font-size: 12px; }
        .input-box { display: flex; padding: 15px; gap: 10px; border-top: 1px solid #1a1a2e; }
        input { flex: 1; background: #05050a; border: 1px solid #333; color: white; padding: 10px; border-radius: 5px; }
        button { background: #5f6eff; border: none; color: white; padding: 0 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2 style="color:#5f6eff">COMMUNITY CHAT</h2>
    <div class="chat">
        <div id="msgs"></div>
        <div class="input-box">
            <input type="text" id="t" placeholder="Сообщение...">
            <button onclick="send()">></button>
        </div>
    </div>
    <a href="home.html" style="margin-top:15px; color:#555; text-decoration:none;">← Назад</a>

    <script>
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
        const user = localStorage.getItem('username');

        async function load() {
            const r = await fetch(`${API}/api/chat`);
            const data = await r.json();
            document.getElementById('msgs').innerHTML = data.map(m => `
                <div class="msg">
                    <div class="u">${m.user} <span style="float:right; color:#444">${m.time}</span></div>
                    <div>${m.text}</div>
                </div>
            `).join('');
        }

        async function send() {
            const text = document.getElementById('t').value;
            if(!text) return;
            await fetch(`${API}/api/chat/send`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user, text })
            });
            document.getElementById('t').value = "";
            load();
        }
        setInterval(load, 2000);
        load();
    </script>
</body>
</html>
