<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Форум</title>
    <style>
        :root {
            --bg: #05050a;
            --card: #0c0c14;
            --primary: #5f6eff;
            --border: #1a1a2e;
            --accent: #4caf50;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Верхняя панель с инфой */
        .user-bar {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info-chips {
            display: flex;
            gap: 20px;
            font-size: 13px;
        }

        .chip {
            background: #161625;
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .chip span { color: var(--primary); font-weight: bold; }

        /* Контейнер чата */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1000px;
            width: 100%;
            margin: 20px auto;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            overflow: hidden;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            background: #161625;
            padding: 10px 15px;
            border-radius: 10px;
            max-width: 80%;
            align-self: flex-start;
        }

        .msg-my {
            align-self: flex-end;
            background: #101c10;
            border-right: 3px solid var(--accent);
        }

        .u { font-size: 12px; font-weight: bold; color: var(--primary); margin-bottom: 4px; }
        .msg-my .u { color: var(--accent); }

        .input-area {
            padding: 20px;
            background: #0e0e1a;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: #05050a;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }

        button {
            background: var(--primary);
            border: none;
            color: white;
            padding: 0 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="user-bar">
        <div style="font-weight: bold; color: var(--primary);">TITANIUM FORUM</div>
        <div class="user-info-chips">
            <div class="chip">User: <span id="disp-user">...</span></div>
            <div class="chip">HWID: <span id="disp-hwid">Связан</span></div>
            <div class="chip">Sub: <span id="disp-sub" style="color: var(--accent);">Active</span></div>
        </div>
        <a href="home.html" style="color: #555; text-decoration: none; font-size: 13px;">← Назад</a>
    </div>

    <div class="chat-main">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="text" placeholder="Написать сообщение..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">ОТПРАВИТЬ</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const user = localStorage.getItem('username');
        const msgsDiv = document.getElementById('messages');
        let lastCount = 0;

        if (!user) window.location.href = "login.html";
        document.getElementById('disp-user').innerText = user;

        // Функция синхронизации данных пользователя (подписка, баланс и т.д.)
        async function syncUser() {
            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: user, password: ""})
                });
                const data = await res.json();
                
                // Если в API есть эти поля, выводим их
                if (data.hwid) document.getElementById('disp-hwid').innerText = "OK";
                // Тут можно добавить логику проверки даты подписки
            } catch(e) { console.error("Sync error"); }
        }

        async function load() {
            try {
                const r = await fetch(`${API}/api/chat`);
                const msgs = await r.json();
                if (msgs.length !== lastCount) {
                    msgsDiv.innerHTML = msgs.map(m => `
                        <div class="msg ${m.user === user ? 'msg-my' : ''}">
                            <div class="u">${m.user}</div>
                            <div class="t">${m.text}</div>
                        </div>
                    `).join('');
                    msgsDiv.scrollTop = msgsDiv.scrollHeight;
                    lastCount = msgs.length;
                }
            } catch (e) {}
        }

        async function send() {
            const input = document.getElementById('text');
            const text = input.value.trim();
            if (!text) return;
            input.value = "";
            await fetch(`${API}/api/chat/send`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user, text })
            });
            load();
        }

        syncUser();
        load();
        setInterval(load, 2000);
    </script>
</body>
</html>
