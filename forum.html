<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Форум</title>
    <style>
        :root {
            --bg: #05050a;
            --card: #0c0c14;
            --primary: #5f6eff;
            --border: #1a1a2e;
            --my-msg: #101c10;
            --my-border: #4caf50;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            height: 85vh;
            overflow: hidden;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }

        .msg {
            background: #161625;
            padding: 10px 15px;
            border-radius: 10px;
            border-left: 3px solid var(--primary);
            max-width: 80%;
            align-self: flex-start;
            word-break: break-word;
        }

        .msg-my {
            align-self: flex-end;
            background: var(--my-msg);
            border-left: none;
            border-right: 3px solid var(--my-border);
            text-align: right;
        }

        .u {
            font-size: 12px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .msg-my .u { color: var(--my-border); }

        .input-area {
            padding: 20px;
            background: #0e0e1a;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: #05050a;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }

        button {
            background: var(--primary);
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { opacity: 0.8; }

        .back-link {
            margin-top: 15px;
            color: #555;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div id="messages"></div>
        
        <div class="input-area">
            <input type="text" id="text" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">ОТПРАВИТЬ</button>
        </div>
    </div>

    <a href="home.html" class="back-link">← Вернуться в кабинет</a>

    <script src="config.js"></script>
    <script>
        const user = localStorage.getItem('username');
        const msgsDiv = document.getElementById('messages');
        let lastMsgCount = 0;

        // Редирект, если не залогинен
        if (!user) {
            window.location.href = "login.html";
        }

        async function load() {
            try {
                const r = await fetch(`${API}/api/chat`);
                if (!r.ok) throw new Error("Ошибка сервера");
                
                const msgs = await r.json();

                // Обновляем только если появились новые сообщения
                if (msgs.length !== lastMsgCount) {
                    msgsDiv.innerHTML = msgs.map(m => `
                        <div class="msg ${m.user === user ? 'msg-my' : ''}">
                            <div class="u">${m.user}</div>
                            <div class="t">${m.text}</div>
                        </div>
                    `).join('');
                    
                    // Скролл вниз
                    msgsDiv.scrollTop = msgsDiv.scrollHeight;
                    lastMsgCount = msgs.length;
                }
            } catch (e) {
                console.error("Ошибка загрузки сообщений:", e);
            }
        }

        async function send() {
            const input = document.getElementById('text');
            const text = input.value.trim();

            if (!text) return;

            // Очищаем поле сразу
            input.value = "";

            try {
                await fetch(`${API}/api/chat/send`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user, text })
                });
                
                // Сразу подгружаем, чтобы не ждать интервала
                load();
            } catch (e) {
                alert("Не удалось отправить сообщение");
            }
        }

        // Запуск
        load();
        setInterval(load, 2000);
    </script>
</body>
</html>
