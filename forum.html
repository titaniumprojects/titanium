<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Forum</title>
    <style>
        body { background: #05050a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .chat-container { width: 100%; max-width: 700px; background: #0c0c14; border: 1px solid #1a1a2e; border-radius: 15px; display: flex; flex-direction: column; height: 80vh; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { background: #161625; padding: 12px; border-radius: 10px; border-left: 3px solid #5f6eff; }
        .u { color: #5f6eff; font-weight: bold; font-size: 13px; margin-bottom: 5px; }
        .t { font-size: 14px; word-wrap: break-word; }
        .input-area { padding: 20px; border-top: 1px solid #1a1a2e; display: flex; gap: 10px; }
        input { flex: 1; background: #05050a; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; outline: none; }
        button { background: #5f6eff; border: none; color: white; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2 style="color: #5f6eff;">COMMUNITY CHAT</h2>
    <div class="chat-container">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="text" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">ОТПРАВИТЬ</button>
        </div>
    </div>
    <a href="home.html" style="margin-top: 20px; color: #555; text-decoration: none;">← Назад на главную</a>

    <script>
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
        const user = localStorage.getItem('username');

        async function load() {
            try {
                const r = await fetch(`${API}/api/chat`);
                const msgs = await r.json();
                const container = document.getElementById('messages');
                const isAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 50;

                container.innerHTML = msgs.map(m => `
                    <div class="msg">
                        <div class="u">${m.user} <span style="color:#444; float:right; font-weight:normal;">${m.time}</span></div>
                        <div class="t">${m.text}</div>
                    </div>
                `).join('');

                if (isAtBottom) container.scrollTop = container.scrollHeight;
            } catch(e) {}
        }

        async function send() {
            const input = document.getElementById('text');
            const text = input.value.trim();
            if(!text || !user) return;
            
            input.value = "";
            await fetch(`${API}/api/chat/send`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user, text})
            });
            load();
        }

        setInterval(load, 3000);
        load();
    </script>
</body>
</html>
