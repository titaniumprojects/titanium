<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Форум</title>
    <style>
        body { background: #05050a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; height: 100vh; box-sizing: border-box;}
        .chat-container { width: 100%; max-width: 800px; background: #0c0c14; border: 1px solid #1a1a2e; border-radius: 15px; display: flex; flex-direction: column; height: 85vh; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { background: #161625; padding: 12px 15px; border-radius: 10px; border-left: 3px solid #5f6eff; word-break: break-word;}
        .msg-my { border-left: none; border-right: 3px solid #4caf50; background: #101c10; text-align: right;}
        .u { color: #5f6eff; font-weight: bold; font-size: 13px; }
        .msg-my .u { color: #4caf50; }
        .t { font-size: 15px; margin-top: 5px; color: #eee; }
        .input-area { padding: 20px; border-top: 1px solid #1a1a2e; display: flex; gap: 10px; background: #0c0c14; border-radius: 0 0 15px 15px;}
        input { flex: 1; background: #05050a; border: 1px solid #333; color: white; padding: 15px; border-radius: 8px; outline: none; }
        button { background: #5f6eff; border: none; color: white; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .back { margin-top: 15px; color: #555; text-decoration: none; font-size: 14px;}
    </style>
</head>
<body>
    <h2 style="color:#5f6eff; margin: 0 0 15px 0;">COMMUNITY FORUM</h2>
    <div class="chat-container">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="text" placeholder="Написать сообщение..." onkeypress="if(event.key === 'Enter') send()">
            <button onclick="send()">ОТПРАВИТЬ</button>
        </div>
    </div>
    <a href="home.html" class="back">← Вернуться на главную</a>

    <script>
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
        const user = localStorage.getItem('username');
        if (!user) window.location.href = "login.html";

        const msgsDiv = document.getElementById('messages');
        let msgCount = 0;

        async function load() {
            try {
                const r = await fetch(`${API}/api/chat`);
                const msgs = await r.json();
                
                if (msgs.length !== msgCount) {
                    msgsDiv.innerHTML = msgs.map(m => `
                        <div class="msg ${m.user === user ? 'msg-my' : ''}">
                            <div class="u">${m.user} <span style="color:#555; font-size: 11px;">${m.time}</span></div>
                            <div class="t">${m.text}</div>
                        </div>
                    `).join('');
                    msgsDiv.scrollTop = msgsDiv.scrollHeight;
                    msgCount = msgs.length;
                }
            } catch(e) {}
        }

        async function send() {
            const input = document.getElementById('text');
            const text = input.value.trim();
            if(!text) return;
            
            input.value = ""; // Очищаем сразу для удобства
            
            await fetch(`${API}/api/chat/send`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user: user, text: text})
            });
            load();
        }

        setInterval(load, 1000); // Обновление каждую секунду
        load();
    </script>
</body>
</html>
