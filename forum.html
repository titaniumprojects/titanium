<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Forum</title>
    <style>
        body { background: #05050a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .chat-container { width: 100%; max-width: 700px; background: #0c0c14; border: 1px solid #1a1a2e; border-radius: 15px; display: flex; flex-direction: column; height: 80vh; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #161625; padding: 10px 15px; border-radius: 10px; border-left: 3px solid #5f6eff; }
        .u { color: #5f6eff; font-weight: bold; font-size: 13px; }
        .t { font-size: 14px; margin-top: 5px; }
        .input-area { padding: 20px; border-top: 1px solid #1a1a2e; display: flex; gap: 10px; }
        input { flex: 1; background: #05050a; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; }
        button { background: #5f6eff; border: none; color: white; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2>COMMUNITY CHAT</h2>
    <div class="chat-container">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="text" placeholder="Напишите что-нибудь...">
            <button onclick="send()">ОТПРАВИТЬ</button>
        </div>
    </div>
    <a href="home.html" style="margin-top: 20px; color: #555; text-decoration: none;">← Вернуться</a>

    <script>
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
        const user = localStorage.getItem('username');

        async function load() {
            const r = await fetch(`${API}/api/chat`);
            const msgs = await r.json();
            document.getElementById('messages').innerHTML = msgs.map(m => `
                <div class="msg">
                    <div class="u">${m.user} <span style="color:#333; float:right;">${m.time}</span></div>
                    <div class="t">${m.text}</div>
                </div>
            `).join('');
        }

        async function send() {
            const text = document.getElementById('text').value;
            if(!text) return;
            await fetch(`${API}/api/chat/send`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user, text})
            });
            document.getElementById('text').value = "";
            load();
        }

        setInterval(load, 3000);
        load();
    </script>
</body>
</html>
