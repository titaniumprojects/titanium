<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titanium | Private Software</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at center, #111122 0%, #05050a 100%);
            color: white; font-family: 'Inter', sans-serif;
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        h1 { font-family: 'Syncopate', sans-serif; font-size: clamp(2rem, 10vw, 4rem); letter-spacing: 5px; margin-bottom: 10px; background: linear-gradient(to right, #fff, #5f6eff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: rgba(255,255,255,0.3); margin-bottom: 40px; letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; }
        .btn-group { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 18px 40px; border-radius: 15px; text-decoration: none; font-weight: bold; transition: 0.3s; text-transform: uppercase; border: none; cursor: pointer; font-size: 0.9rem; }
        .btn-blue { background: #5f6eff; color: white; box-shadow: 0 10px 25px rgba(95, 110, 255, 0.3); }
        .btn-outline { background: rgba(255,255,255,0.03); color: white; border: 1px solid rgba(255,255,255,0.1); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(95, 110, 255, 0.4); }
    </style>
</head>
<body>
    <h1>TITANIUM</h1>
    <p>Premium solutions for elite users</p>
    <div class="btn-group" id="main-ui">
        <a href="login.html" class="btn btn-blue">ВОЙТИ</a>
        <a href="register.html" class="btn btn-outline">РЕГИСТРАЦИЯ</a>
    </div>

    <script>
        const user = localStorage.getItem('titanium_user');
        if (user) {
            document.getElementById('main-ui').innerHTML = `
                <a href="home.html" class="btn btn-blue">В ЛИЧНЫЙ КАБИНЕТ</a>
                <div onclick="logout()" class="btn btn-outline">ВЫЙТИ (${user.toUpperCase()})</div>
            `;
        }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
