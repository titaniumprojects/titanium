<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Titanium | Главная</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:monospace;}
        body{background:#0a0f0a;color:#cfc;display:flex;height:100vh;overflow:hidden;}
        .sidebar{width:280px;background:#0c120c;border-right:1px solid #1f3a1f;padding:25px 20px;display:flex;flex-direction:column;}
        .logo{font-size:28px;font-weight:800;color:#2ecc2e;margin-bottom:35px;}
        .profile-card{background:#0e150e;border:1px solid #2a4d2a;border-radius:24px;padding:20px;text-align:center;margin-bottom:25px;}
        .avatar{width:70px;height:70px;background:#1f3a1f;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:bold;color:#2ecc2e;border:1px solid #2ecc2e;}
        .status-item{background:#0a0f0a;border:1px solid #2a4d2a;padding:8px 12px;border-radius:16px;display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;}
        .nav-item{padding:12px 16px;margin:5px 0;border-radius:16px;color:#8bc48b;text-decoration:none;display:flex;gap:12px;}
        .nav-item:hover,.nav-item.active{background:#1a2e1a;color:#2ecc2e;}
        .logout{margin-top:auto;text-align:center;font-size:13px;color:#5a7e5a;cursor:pointer;}
        .main{flex:1;overflow-y:auto;padding:25px 30px;}
        .roulette-card{background:#0e150e;border:1px solid #2a4d2a;border-radius:28px;padding:20px;margin-bottom:30px;}
        .viewport{width:100%;height:90px;background:#060906;border-radius:20px;position:relative;overflow:hidden;margin:15px 0;}
        .pointer{position:absolute;top:0;left:50%;width:4px;height:100%;background:#2ecc2e;z-index:5;transform:translateX(-50%);}
        .track{display:flex;position:absolute;height:100%;will-change:transform;}
        .track-item{min-width:130px;height:100%;display:flex;align-items:center;justify-content:center;background:#0c120c;border-right:1px solid #1f3a1f;}
        .spin-btn{background:#2ecc2e;border:none;padding:12px 28px;border-radius:40px;font-weight:bold;cursor:pointer;display:block;margin:0 auto;}
        .spin-btn:disabled{background:#2a4d2a;cursor:not-allowed;}
        .market-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;margin-top:20px;}
        .market-item{background:#0e150e;border:1px solid #2a4d2a;border-radius:24px;padding:18px;}
        .error-msg{color:#ff8888;text-align:center;padding:20px;}
    </style>
    <script src="config.js"></script>
</head>
<body>
<div class="sidebar">
    <div class="logo">TITANIUM</div>
    <div class="profile-card">
        <div class="avatar" id="avatarInit">T</div>
        <div class="username" id="userName">Загрузка...</div>
        <div class="status-item"><span>💰 Баланс</span><span id="balanceVal">0 ₽</span></div>
        <div class="status-item"><span>🎫 Статус</span><span id="subStatus">USER</span></div>
    </div>
    <nav>
        <a href="index.html" class="nav-item active">🏠 Главная</a>
        <a href="store.html" class="nav-item">🛒 Магазин</a>
        <a href="roulette.html" class="nav-item">🎰 Рулетка</a>
        <a href="forum.html" class="nav-item">💬 Форум</a>
        <a href="purchase.html" class="nav-item">💳 Пополнение</a>
        <a href="settings.html" class="nav-item">⚙️ Настройки</a>
        <a href="admin.html" id="adminLink" class="nav-item" style="display:none;">🛠 Админ</a>
    </nav>
    <div class="logout" onclick="logout()">🚪 Выйти</div>
</div>
<main class="main">
    <div class="roulette-card">
        <h3>🎁 Ежедневная рулетка</h3>
        <div class="viewport">
            <div class="pointer"></div>
            <div id="track" class="track"></div>
        </div>
        <button class="spin-btn" id="spinBtn" onclick="spin()">КРУТИТЬ</button>
        <div id="cdInfo" style="text-align:center; font-size:13px; margin-top:12px;"></div>
    </div>
    <h3>🔥 Товары</h3>
    <div id="marketList" class="market-grid"></div>
</main>
<script>
    const username = localStorage.getItem('username');
    if (!username) window.location.href = "login.html";
    document.getElementById('userName').innerText = username;
    document.getElementById('avatarInit').innerText = username[0].toUpperCase();

    async function sync() {
        try {
            const res = await fetch(`${API}/login`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({username, password:""})
            });
            const data = await res.json();
            if(data.status === "success") {
                document.getElementById('balanceVal').innerText = (data.balance || 0) + " ₽";
                if (data.is_admin) document.getElementById('adminLink').style.display = "flex";
            } else {
                console.error("Sync error");
            }
        } catch(e) { console.error(e); }
    }

    async function loadMarket() {
        const container = document.getElementById('marketList');
        container.innerHTML = '<div style="text-align:center;">Загрузка...</div>';
        try {
            const r = await fetch(`${API}/api/market`);
            if (!r.ok) throw new Error("HTTP error");
            const items = await r.json();
            if(items.length === 0) {
                container.innerHTML = '<div class="error-msg">Товаров пока нет</div>';
                return;
            }
            container.innerHTML = items.slice(0,4).map(item => `
                <div class="market-item">
                    <strong>${item.title}</strong><br>
                    <span style="color:#2ecc2e;">${item.price} ₽</span>
                    <div><a href="store.html" style="color:#8bc48b;">Купить</a></div>
                </div>
            `).join('');
        } catch(e) {
            console.error(e);
            container.innerHTML = '<div class="error-msg">Ошибка загрузки товаров. Проверьте соединение с сервером.</div>';
        }
    }

    const rewards = ["10 ₽","20 ₽","50 ₽","100 ₽","Промокод","500 ₽","ULTRA"];
    const track = document.getElementById('track');
    function initTrack() {
        track.innerHTML = '';
        for(let i=0;i<70;i++) {
            const div = document.createElement('div');
            div.className = 'track-item';
            div.innerText = rewards[Math.floor(Math.random() * rewards.length)];
            track.appendChild(div);
        }
    }

    async function spin() {
        const btn = document.getElementById('spinBtn');
        btn.disabled = true;
        try {
            const res = await fetch(`${API}/api/roulette/spin`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({username})
            });
            const data = await res.json();
            if(data.status === "error") {
                alert(data.message);
                btn.disabled = false;
                return;
            }
            const win = data.win;
            const winIndex = 38;
            const itemW = 131;
            const offset = (winIndex * itemW) - (track.parentElement.offsetWidth/2) + (itemW/2);
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';
            initTrack();
            track.children[winIndex].innerText = win;
            track.children[winIndex].style.color = "#2ecc2e";
            setTimeout(() => {
                track.style.transition = 'transform 5s cubic-bezier(0.1,0,0.1,1)';
                track.style.transform = `translateX(-${offset + (Math.random()*30-15)}px)`;
            },20);
            setTimeout(() => {
                alert(`🎉 Вы выиграли: ${win}`);
                localStorage.setItem(`lastSpin_${username}`, Date.now());
                sync();
                checkCooldown();
                btn.disabled = false;
            },5200);
        } catch(e) { alert("Ошибка сервера"); btn.disabled=false; }
    }

    function checkCooldown() {
        const last = localStorage.getItem(`lastSpin_${username}`);
        const btn = document.getElementById('spinBtn');
        const cdDiv = document.getElementById('cdInfo');
        if (last && Date.now() - parseInt(last) < 86400000) {
            btn.disabled = true;
            const hours = Math.ceil((86400000 - (Date.now() - parseInt(last))) / 3600000);
            cdDiv.innerText = `⏳ Доступно через ${hours} ч`;
        } else { cdDiv.innerText = "✅ Бонус доступен!"; }
    }

    function logout() { localStorage.removeItem('username'); window.location.href="login.html"; }

    initTrack();
    checkCooldown();
    sync();
    loadMarket();
</script>
</body>
</html>
