<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Login</title>
    <style>
        body { background: #05050a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #0c0c14; padding: 40px; border-radius: 20px; border: 1px solid #1a1a2e; text-align: center; width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a2e; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #5f6eff; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="color:#5f6eff">TITANIUM</h1>
        <input type="text" id="u" placeholder="Логин">
        <input type="password" id="p" placeholder="Пароль">
        <button onclick="doLogin()">ВОЙТИ</button>
        <a href="register.html" style="color:gray; font-size:12px; display:block; margin-top:15px; text-decoration:none;">Регистрация</a>
    </div>

    <script src="config.js"></script>
    <script>
        async function doLogin() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (data.status === "success") {
                    localStorage.setItem('username', u);
                    window.location.href = "home.html";
                } else { alert(data.message); }
            } catch(e) { alert("Сервер недоступен"); }
        }
    </script>
</body>
</html>
