<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Titanium | Вход</title>
    <style>
        body{background:#0a0f0a;color:#cfc;font-family:monospace;display:flex;justify-content:center;align-items:center;height:100vh;}
        .card{background:#0e150e;border:1px solid #2a4d2a;border-radius:32px;padding:40px;width:340px;text-align:center;}
        h1{color:#2ecc2e;}
        input{width:100%;padding:14px;margin:10px 0;background:#0a0f0a;border:1px solid #2a4d2a;color:#cfc;border-radius:40px;}
        button{width:100%;padding:14px;background:#2ecc2e;border:none;border-radius:40px;font-weight:bold;cursor:pointer;}
        a{color:#8bc48b;display:block;margin-top:20px;}
    </style>
    </head>
<body>
<div class="card">
    <h1>TITANIUM</h1>
    <input type="text" id="username" placeholder="Логин">
    <input type="password" id="password" placeholder="Пароль">
    <button id="loginBtn">ВОЙТИ</button>
    <a href="register.html">Создать аккаунт</a>
</div>
<script>
    document.getElementById('loginBtn').onclick = async () => {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const btn = document.getElementById('loginBtn');
        if(!username) return alert("Введите логин");
        btn.disabled = true;
        btn.innerText = "ВХОД...";
        try{
            const res = await fetch(`${API}/login`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({username, password})
            });
            const data = await res.json();
            if(data.status === "success"){
                localStorage.setItem('username', data.username);
                window.location.href = "index.html";
            } else alert(data.message || "Ошибка");
        } catch(e){ alert("Сервер недоступен"); }
        finally{ btn.disabled=false; btn.innerText="ВОЙТИ"; }
    };
</script>
</body>
</html>
