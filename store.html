<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Магазин</title>
    <style>
        body { background: #05050a; color: white; font-family: sans-serif; padding: 50px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 800px; margin: 0 auto; }
        .item { background: #0c0c14; padding: 20px; border-radius: 15px; border: 1px solid #1a1a2e; }
        .price { color: #4caf50; font-weight: bold; font-size: 1.2rem; }
        .btn { display: block; padding: 10px; background: #5f6eff; color: white; text-decoration: none; border-radius: 8px; margin-top: 10px; cursor: pointer; border: none; }
        .back { color: #555; text-decoration: none; display: inline-block; margin-top: 30px; }
    </style>
</head>
<body>
    <h1>МАГАЗИН ТОВАРОВ</h1>
    <div class="grid">
        <div class="item">
            <h3>Подписка Lite</h3>
            <p class="price">100₽</p>
            <button class="btn" onclick="buy('Lite', 100)">КУПИТЬ</button>
        </div>
        <div class="item">
            <h3>Подписка Pro</h3>
            <p class="price">500₽</p>
            <button class="btn" onclick="buy('Pro', 500)">КУПИТЬ</button>
        </div>
    </div>
    <a href="home.html" class="back">← Назад на главную</a>

    <script>
        function buy(name, price) {
            alert("Вы выбрали " + name + ". Модуль оплаты в разработке!");
        }
    </script>
</body>
</html>
