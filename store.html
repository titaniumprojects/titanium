<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Магазин</title>
    <style>
        body { background: #05050a; color: white; font-family: sans-serif; padding: 50px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 900px; margin: 40px auto; }
        .item { background: #0c0c14; padding: 30px; border-radius: 20px; border: 1px solid #1a1a2e; transition: 0.3s; }
        .item:hover { border-color: #5f6eff; transform: translateY(-5px); }
        h3 { margin: 0; color: #5f6eff; }
        .price { color: #4caf50; font-size: 24px; font-weight: bold; margin: 20px 0; }
        .btn { width: 100%; padding: 12px; background: #5f6eff; color: white; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; }
        .back { color: #555; text-decoration: none; margin-top: 30px; display: inline-block; }
    </style>
</head>
<body>
    <h1>SUBSCRIPTIONS</h1>
    <div class="grid">
        <div class="item">
            <h3>LITE</h3>
            <p style="color:gray; font-size:12px;">Базовый доступ на 30 дней</p>
            <div class="price">149₽</div>
            <button class="btn" onclick="buySub('Lite', 149)">КУПИТЬ</button>
        </div>
        <div class="item">
            <h3>PRO</h3>
            <p style="color:gray; font-size:12px;">Полный функционал + приоритет</p>
            <div class="price">499₽</div>
            <button class="btn" onclick="buySub('Pro', 499)">КУПИТЬ</button>
        </div>
    </div>
    <a href="home.html" class="back">← Назад на главную</a>

    <script>
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
        const user = localStorage.getItem('username');

        async function buySub(name, price) {
            if(!user) return window.location.href="login.html";
            if(!confirm(`Купить подписку ${name} за ${price}₽?`)) return;

            // Проверяем текущий баланс через логин-запрос
            const res = await fetch(`${API}/login`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: "" })
            });
            const data = await res.json();

            if (data.balance < price) {
                alert(`Недостаточно средств! Баланс: ${data.balance}₽\nПополните его в разделе пополнения.`);
            } else {
                alert("Заявка принята! Администратор свяжется с вами для активации.");
            }
        }
    </script>
</body>
</html>
