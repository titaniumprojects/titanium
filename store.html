<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Market</title>
    <style>
        body { background: #05050a; color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #0c0c14; border: 1px solid #1a1a2e; border-radius: 12px; padding: 20px; text-align: center; }
        .price { color: #4caf50; font-size: 20px; font-weight: bold; margin: 10px 0; }
        button { background: #5f6eff; border: none; color: white; width: 100%; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #222; color: #555; }
    </style>
</head>
<body>
    <h2 style="color:#5f6eff">SUBSCRIPTIONS & ITEMS</h2>
    <div id="list" class="grid">Загрузка товаров...</div>
    <a href="home.html" style="display:block; margin-top:30px; color:#555; text-decoration:none; text-align:center;">← Назад</a>

    <script>
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
        const user = localStorage.getItem('username');

        async function load() {
            const res = await fetch(`${API}/api/market`);
            const items = await res.json();
            
            // Получаем инфу о юзере (баланс и покупки)
            const uRes = await fetch(`${API}/login`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: ""})
            });
            const uData = await uRes.json();

            const list = document.getElementById('list');
            if(!items.length) { list.innerHTML = "Товаров нет"; return; }

            list.innerHTML = items.map(i => `
                <div class="card">
                    <h3>${i.title}</h3>
                    <p style="color:gray; font-size:12px">${i.desc}</p>
                    <div class="price">${i.price}₽</div>
                    ${uData.purchases.includes(i.id) 
                        ? `<button disabled>КУПЛЕНО</button>` 
                        : `<button onclick="buy('${i.id}')">КУПИТЬ</button>`}
                </div>
            `).join('');
        }

        async function buy(id) {
            const r = await fetch(`${API}/api/market/buy`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, item_id: id })
            });
            const d = await r.json();
            if(d.status === "success") { alert("Успешная покупка!"); load(); }
            else alert(d.message);
        }
        load();
    </script>
</body>
</html>
