<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Магазин</title>
    <style>
        body { background: #05050a; color: white; font-family: sans-serif; padding: 50px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 800px; margin: 0 auto; }
        .item { background: #0c0c14; padding: 20px; border-radius: 15px; border: 1px solid #1a1a2e; transition: 0.3s; }
        .item:hover { border-color: #5f6eff; transform: translateY(-5px); }
        .price { color: #4caf50; font-weight: bold; font-size: 1.2rem; margin: 10px 0; }
        .btn { display: block; width: 100%; padding: 12px; background: #5f6eff; color: white; text-decoration: none; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; }
        .btn:hover { background: #4a56d4; }
        .back { color: #555; text-decoration: none; display: inline-block; margin-top: 30px; font-size: 14px; }
        .back:hover { color: #888; }
    </style>
</head>
<body>
    <h1>МАГАЗИН ТОВАРОВ</h1>
    <div class="grid">
        <div class="item">
            <h3>Подписка Lite</h3>
            <p>Доступ к базовым функциям</p>
            <p class="price">100₽</p>
            <button class="btn" onclick="buy('Lite', 100)">КУПИТЬ</button>
        </div>
        <div class="item">
            <h3>Подписка Pro</h3>
            <p>Максимальный приоритет</p>
            <p class="price">500₽</p>
            <button class="btn" onclick="buy('Pro', 500)">КУПИТЬ</button>
        </div>
    </div>
    <a href="home.html" class="back">← Назад на главную</a>

    <script>
        // Эту строку теперь будет автоматически обновлять скрипт 123.py
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";

        async function buy(name, price) {
            const user = localStorage.getItem('username');
            if (!user) return alert("Сначала войдите в аккаунт!");

            if (!confirm(`Вы уверены, что хотите купить ${name} за ${price}₽?`)) return;

            try {
                // В будущем здесь будет запрос к серверу на списание баланса
                // Пока оставим проверку связи с сервером
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: "" })
                });
                const data = await res.json();

                if (data.balance < price) {
                    alert("Недостаточно средств! Ваш баланс: " + data.balance + "₽");
                } else {
                    alert(`Запрос отправлен! Администратор активирует ${name} в ближайшее время.`);
                }
            } catch (e) {
                alert("Ошибка связи с сервером. Попробуйте позже.");
            }
        }
    </script>
</body>
</html>
