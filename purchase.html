<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Top Up</title>
    <style>
        body { background: #05050a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #0c0c14; padding: 40px; border-radius: 20px; border: 1px solid #1a1a2e; width: 300px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; background: #05050a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; text-align: center; font-size: 18px;}
        button { width: 100%; padding: 15px; background: #4caf50; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px;}
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#4caf50; margin-top:0;">ПОПОЛНЕНИЕ</h2>
        <input type="number" id="amt" placeholder="Сумма в ₽">
        <button onclick="pay()">ПЕРЕЙТИ К ОПЛАТЕ</button>
        <div id="out" style="margin-top:20px"></div>
        <a href="home.html" style="display:block; margin-top:20px; color:#555; text-decoration:none; font-size:14px;">← Назад</a>
    </div>

    <script>
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
        async function pay() {
            const amount = document.getElementById('amt').value;
            if(amount < 10) return alert("Минимальная сумма 10₽");
            
            const r = await fetch(`${API}/create_invoice`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: localStorage.getItem('username'), amount })
            });
            const d = await r.json();
            if(d.status === "success") {
                window.location.href = d.pay_url;
            }
        }
    </script>
</body>
</html>
