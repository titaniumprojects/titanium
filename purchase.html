<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Пополнение</title>
    <style>
        body { background: #05050a; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .card { background: #0c0c14; padding: 30px; border-radius: 20px; border: 1px solid #1a1a2e; max-width: 400px; margin: 20px auto; }
        .price { color: #4caf50; font-size: 20px; margin: 15px 0; }
        button { background: #5f6eff; border: none; color: white; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        #status { margin-top: 20px; color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <h1>TOP UP BALANCE</h1>
    <div class="card">
        <h3>ПОПОЛНИТЬ ЧЕРЕЗ CRYPTO</h3>
        <p style="font-size: 12px; color: gray;">Минимальная сумма: 100₽</p>
        <input type="number" id="amount" placeholder="Сумма в рублях" style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px; border:none;">
        <button onclick="createPay()">СОЗДАТЬ СЧЕТ</button>
        <div id="status"></div>
    </div>
    <a href="home.html" style="color: #555; text-decoration: none;">← Вернуться</a>

    <script>
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
        const user = localStorage.getItem('username');

        async function createPay() {
            const amount = document.getElementById('amount').value;
            if(amount < 100) return alert("Минимум 100₽!");

            const status = document.getElementById('status');
            status.innerText = "Генерация счета...";

            try {
                const res = await fetch(`${API}/create_invoice`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, amount: amount })
                });
                const data = await res.json();

                if (data.status === "success") {
                    status.innerHTML = `<a href="${data.pay_url}" target="_blank" style="color:#4caf50; font-weight:bold; text-decoration:none;">НАЖМИТЕ ЗДЕСЬ ДЛЯ ОПЛАТЫ</a>`;
                    window.open(data.pay_url, '_blank');
                } else {
                    status.innerText = "Ошибка: " + data.message;
                }
            } catch (e) { status.innerText = "Сервер оплаты недоступен."; }
        }
    </script>
</body>
</html>
