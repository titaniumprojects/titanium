<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Titanium | Пополнение</title>
    <style>
        body{background:#0a0f0a;color:#cfc;display:flex;justify-content:center;align-items:center;height:100vh;font-family:monospace;}
        .card{background:#0e150e;border:1px solid #2a4d2a;border-radius:32px;padding:40px;width:320px;text-align:center;}
        input{width:100%;padding:14px;background:#0a0f0a;border:1px solid #2a4d2a;border-radius:40px;color:#cfc;margin:20px 0;text-align:center;}
        button{background:#2ecc2e;border:none;padding:14px;border-radius:40px;font-weight:bold;width:100%;cursor:pointer;}
        a{color:#8bc48b;display:block;margin-top:20px;}
    </style>
</head>
<body>
<div class="card">
    <h2>💳 ПОПОЛНЕНИЕ</h2>
    <input type="number" id="amount" placeholder="Сумма в ₽">
    <button id="payBtn">К КРИПТО-ОПЛАТЕ</button>
    <a href="index.html">← Назад</a>
</div>
<script>
    document.getElementById('payBtn').onclick = (e) => {
        e.preventDefault();
        const amount = document.getElementById('amount').value;
        if(!amount || amount<10) return alert("Минимум 10 ₽");
        alert(`🔗 Ссылка на оплату (крипто-бот):\nСумма ${amount} ₽\nТокен создан. После оплаты средства зачислятся автоматически.`);
    };
</script>
</body>
</html>
