<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Titanium | Магазин</title>
    <style>
        body { background: #05050a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .pricing { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
        .card { background: #0c0c14; padding: 30px; border-radius: 20px; border: 1px solid #1a1a2e; text-align: center; width: 220px; }
        .price { font-size: 2rem; color: #5f6eff; margin: 15px 0; }
        button { width: 100%; padding: 12px; background: #5f6eff; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .back { margin-top: 30px; color: #555; text-decoration: none; }
    </style>
</head>
<body>
    <h1>ТАРИФЫ</h1>
    <div class="pricing">
        <div class="card"><h3>7 Дней</h3><div class="price">149₽</div><button onclick="buy(149)">КУПИТЬ</button></div>
        <div class="card"><h3>14 Дней</h3><div class="price">299₽</div><button onclick="buy(299)">КУПИТЬ</button></div>
        <div class="card"><h3>30 Дней</h3><div class="price">599₽</div><button onclick="buy(599)">КУПИТЬ</button></div>
    </div>
    <a href="home.html" class="back">← В кабинет</a>

<script>
    const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
    const user = localStorage.getItem('titanium_user');

    async function buy(price) {
        if (!user) return window.location.href = "login.html";
        const params = new URLSearchParams();
        params.append('user', user);
        params.append('price', price);

        try {
            const res = await fetch(`${API}/api/buy_sub`, { method: 'POST', body: params });
            const data = await res.json();
            if (data.status === "success") {
                alert("Успешно!");
                window.location.href = "home.html";
            } else {
                if (confirm("Недостаточно средств. Пополнить через Crypto Bot?")) payCrypto(price);
            }
        } catch (e) { alert("Ошибка сервера"); }
    }

    async function payCrypto(amount) {
        const params = new URLSearchParams();
        params.append('user', user);
        params.append('amount', amount);
        try {
            const res = await fetch(`${API}/api/pay/crypto`, { method: 'POST', body: params });
            const data = await res.json();
            if (data.status === "success") window.location.href = data.url;
            else alert("Ошибка платежа");
        } catch (e) { alert("Ошибка API"); }
    }
</script>
</body>
</html>
