<div class="card">
    <h2>Подписка на 30 дней</h2>
    <p>Цена: 500₽</p>
    <button class="buy-btn" onclick="buyProduct(500)">Купить</button>
</div>

<div id="payment-status" style="display:none; margin-top: 20px; padding: 15px; border: 1px solid #5f6eff; border-radius: 10px;">
    <p id="pay-text">Счет создан!</p>
    <a id="pay-link" href="#" target="_blank" style="color: #4caf50; font-weight: bold;">ОПЛАТИТЬ В CRYPTO BOT</a>
    <br><br>
    <button onclick="checkPayment()" style="background: #5f6eff; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">
        Я оплатил (Проверить)
    </button>
</div>

<script>
    const API_URL = "https://heptarchal-stanton-hemispheric.ngrok-free.dev"; // ВСТАВЬ СВОЙ NGROK СЮДА!
    let currentInvoiceId = null;

    async function buyProduct(amount) {
        const username = localStorage.getItem('username');
        if (!username) return alert("Сначала войдите в аккаунт!");

        const response = await fetch(`${API_URL}/create_invoice`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, amount })
        });

        const result = await response.json();

        if (result.status === "success") {
            currentInvoiceId = result.invoice_id;
            document.getElementById('payment-status').style.display = 'block';
            document.getElementById('pay-link').href = result.pay_url;
            document.getElementById('pay-text').innerText = `Счет на ${amount}₽ успешно создан.`;
        } else {
            alert("Ошибка при создании счета: " + result.message);
        }
    }

    async function checkPayment() {
        const username = localStorage.getItem('username');
        if (!currentInvoiceId) return;

        const response = await fetch(`${API_URL}/check_payment/${currentInvoiceId}/${username}`);
        const result = await response.json();

        if (result.status === "paid") {
            alert("Оплата прошла успешно! Ваш баланс пополнен.");
            window.location.href = "home.html";
        } else {
            alert("Оплата еще не получена. Попробуйте через минуту.");
        }
    }
</script>
