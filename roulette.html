<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Titanium | Рулетка</title>
    <style>
        body{background:#0a0f0a;color:#cfc;text-align:center;padding:40px;font-family:monospace;}
        .viewport{width:90%;height:100px;background:#060906;border-radius:20px;margin:30px auto;position:relative;overflow:hidden;border:1px solid #2a4d2a;}
        .pointer{position:absolute;top:0;left:50%;width:4px;height:100%;background:#2ecc2e;z-index:5;transform:translateX(-50%);}
        .track{display:flex;position:absolute;height:100%;will-change:transform;}
        .item{min-width:140px;height:100%;display:flex;align-items:center;justify-content:center;background:#0c120c;border-right:1px solid #1f3a1f;font-weight:bold;}
        button{background:#2ecc2e;border:none;padding:14px 40px;border-radius:40px;font-weight:bold;cursor:pointer;margin-top:20px;}
        a{color:#8bc48b;display:block;margin-top:30px;}
    </style>
    </head>
<body>
<h2>🎰 VIP РУЛЕТКА</h2>
<div class="viewport">
    <div class="pointer"></div>
    <div id="track" class="track"></div>
</div>
<button id="spinBtn" onclick="doSpin()">КРУТИТЬ</button>
<a href="index.html">← Назад</a>
<script>
    const username = localStorage.getItem('username');
    if (!username) window.location.href = "login.html";

    const prizes = ["10 ₽","30 ₽","70 ₽","150 ₽","Промокод","500 ₽","ULTRA"];
    const track = document.getElementById('track');
    function init() {
        track.innerHTML = '';
        for(let i=0;i<80;i++) {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerText = prizes[Math.floor(Math.random() * prizes.length)];
            track.appendChild(div);
        }
    }

    async function doSpin() {
        const btn = document.getElementById('spinBtn');
        btn.disabled = true;
        try {
            const res = await fetch(`${API}/api/roulette/spin`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({username})
            });
            const data = await res.json();
            if(data.status === "error") {
                alert(data.message);
                btn.disabled=false;
                return;
            }
            const win = data.win;
            const idx = 45;
            const offset = (idx * 150) - (track.parentElement.offsetWidth/2) + 75;
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';
            init();
            track.children[idx].innerText = win;
            track.children[idx].style.color = "#2ecc2e";
            setTimeout(() => {
                track.style.transition = 'transform 6s cubic-bezier(0.1,0,0.1,1)';
                track.style.transform = `translateX(-${offset + (Math.random()*40-20)}px)`;
            },20);
            setTimeout(() => {
                alert(`🏆 ВЫИГРЫШ: ${win}`);
                btn.disabled=false;
            },6200);
        } catch(e) { alert("Ошибка сервера"); btn.disabled=false; }
    }
    init();
</script>
</body>
</html>
