<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Daily Roulette</title>
    <style>
        :root { 
            --bg: #05050a; 
            --card: #0c0c14; 
            --primary: #5f6eff; 
            --border: #1a1a2e; 
            --win: #4caf50; 
        }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px; 
            margin: 0; 
        }

        .roulette-wrapper {
            width: 100%;
            max-width: 900px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: var(--primary);
            z-index: 10;
            box-shadow: 0 0 15px var(--primary);
        }

        .track {
            display: flex;
            gap: 10px;
            transition: transform 8s cubic-bezier(0.1, 0, 0.1, 1);
            will-change: transform;
        }

        .item {
            min-width: 150px;
            height: 150px;
            background: #161625;
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
            color: white;
        }

        .btn-spin {
            margin-top: 40px;
            padding: 15px 60px;
            background: var(--primary);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn-spin:disabled { background: #1a1a2e; color: #555; cursor: not-allowed; }

        /* Модальное окно выигрыша */
        #winModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .win-card {
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--win);
            text-align: center;
        }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 50px;">ЕЖЕДНЕВНЫЙ БОНУС</h1>

    <div class="roulette-wrapper">
        <div class="pointer"></div>
        <div class="track" id="track"></div>
    </div>

    <button class="btn-spin" id="spinBtn" onclick="spin()">КРУТИТЬ БЕСПЛАТНО</button>
    <a href="home.html" style="margin-top: 20px; color: #555; text-decoration: none;">← Вернуться в кабинет</a>

    <div id="winModal">
        <div class="win-card">
            <h2 style="color: var(--win)">ВЫ ВЫИГРАЛИ!</h2>
            <h1 id="winName">0 ₽</h1>
            <button class="btn-spin" onclick="claimReward()" style="background: var(--win)">ЗАБРАТЬ ПРИЗ</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const user = localStorage.getItem('username');
        if (!user) window.location.href = "login.html";

        const track = document.getElementById('track');
        // Визуальные элементы для массовки в анимации
        const itemsList = ["10 ₽", "50 ₽", "100 ₽", "500 ₽", "ULTRA", "10 ₽", "50 ₽"];

        function initTrack() {
            track.innerHTML = "";
            for (let i = 0; i < 80; i++) {
                const rand = itemsList[Math.floor(Math.random() * itemsList.length)];
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<span>${rand}</span>`;
                track.appendChild(div);
            }
        }

        function checkCooldown() {
            const last = localStorage.getItem(`lastSpin_${user}`);
            const btn = document.getElementById('spinBtn');
            if (last && Date.now() - parseInt(last) < 24 * 60 * 60 * 1000) {
                btn.disabled = true;
                btn.innerText = "ПРИХОДИТЕ ЗАВТРА";
            }
        }

        async function spin() {
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;

            try {
                // 1. Спрашиваем у твоего server.py результат прокрутки
                const response = await fetch(`${API}/api/roulette/spin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user })
                });
                const data = await response.json();

                // Если сервер не дал крутить (например, КД)
                if (data.status === "error") {
                    alert(data.message);
                    checkCooldown(); // На всякий случай обновляем UI
                    return;
                }

                // 2. Сервер разрешил и выдал приз
                const winName = data.win; 

                // 3. Подготовка анимации
                const itemWidth = 160; 
                const winIndex = 65; 
                const offset = (winIndex * itemWidth) - (track.parentElement.offsetWidth / 2) + (itemWidth / 2);
                const randomExtra = Math.floor(Math.random() * 60) - 30;

                track.style.transition = 'none';
                track.style.transform = 'translateX(0)';
                initTrack();
                
                // Вставляем реальный выигрыш с сервера в точку остановки рулетки
                track.children[winIndex].innerHTML = `<span style="color: var(--win)">${winName}</span>`;

                // 4. Запуск визуальной части
                setTimeout(() => {
                    track.style.transition = 'transform 8s cubic-bezier(0.1, 0, 0.1, 1)';
                    track.style.transform = `translateX(-${offset + randomExtra}px)`;
                }, 50);

                // 5. Окончание прокрутки
                setTimeout(() => {
                    document.getElementById('winName').innerText = winName;
                    document.getElementById('winModal').style.display = 'flex';
                    
                    // Записываем локально, чтобы кнопка сразу заблокировалась
                    localStorage.setItem(`lastSpin_${user}`, Date.now());
                }, 8500);

            } catch (e) {
                alert("Ошибка связи с сервером TITANIUM");
                btn.disabled = false;
            }
        }

        function claimReward() {
            // Сервер УЖЕ зачислил деньги в функции spin на бэкенде.
            // Нам остается только вернуть пользователя на главную, где sync() подтянет новый баланс.
            window.location.href = "home.html";
        }

        initTrack();
        checkCooldown();
    </script>
</body>
</html>
