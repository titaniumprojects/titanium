<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Admin</title>
    <style>
        body { background: #05050a; color: white; font-family: sans-serif; padding: 40px; }
        .admin-card { background: #0c0c14; padding: 30px; border-radius: 20px; border: 1px solid #1a1a2e; max-width: 450px; margin: 0 auto; }
        h2 { text-align: center; color: #ff4b4b; margin-bottom: 30px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; background: #05050a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4caf50; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <div class="admin-card">
        <h2>ADMIN PANEL</h2>
        
        <label>НИКНЕЙМ ПОЛЬЗОВАТЕЛЯ</label>
        <input type="text" id="target" placeholder="Введите логин">
        
        <label>СУММА ДЛЯ ВЫДАЧИ (₽)</label>
        <input type="number" id="bal" value="0">
        
        <button onclick="give()">ОБНОВИТЬ БАЛАНС</button>
        
        <a href="home.html" style="display:block; text-align:center; margin-top:25px; color:#555; text-decoration:none; font-size:13px;">← Вернуться</a>
    </div>

    <script>
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";

        async function give() {
            const target = document.getElementById('target').value.trim();
            const balance = document.getElementById('bal').value;

            if(!target) return alert("Введите ник!");

            const r = await fetch(`${API}/api/admin/give`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ target, balance })
            });
            const data = await r.json();
            
            if(data.status === "success") {
                alert("Баланс успешно изменен!");
                document.getElementById('target').value = "";
            } else {
                alert(data.message || "Ошибка доступа");
            }
        }
    </script>
</body>
</html>
