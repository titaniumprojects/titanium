<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Admin</title>
    <style>
        body { background: #05050a; color: white; font-family: sans-serif; padding: 40px; }
        .admin-card { background: #0c0c14; padding: 30px; border-radius: 20px; border: 1px solid #1a1a2e; max-width: 500px; margin: 0 auto; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #05050a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4caf50; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="admin-card">
        <h2 style="text-align: center; color: #ff4b4b;">MANAGEMENT</h2>
        <label>Никнейм пользователя</label>
        <input type="text" id="target" placeholder="Например: notopezdix">
        
        <label>Добавить баланс (₽)</label>
        <input type="number" id="bal" value="0">
        
        <label>Выдать подписку</label>
        <select id="sub">
            <option value="0">Не менять</option>
            <option value="7">7 Дней</option>
            <option value="14">14 Дней</option>
            <option value="30">30 Дней</option>
        </select>
        
        <button onclick="give()">ВЫДАТЬ РЕСУРСЫ</button>
        <a href="home.html" style="display:block; text-align:center; margin-top:20px; color:#555; text-decoration:none;">Назад</a>
    </div>

    <script>
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
        async function give() {
            const target = document.getElementById('target').value;
            const balance = document.getElementById('bal').value;
            const sub = document.getElementById('sub').value;

            const r = await fetch(`${API}/api/admin/give`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({target, balance, sub})
            });
            const res = await r.json();
            alert(res.status === "success" ? "Успешно выдано!" : res.message);
        }
    </script>
</body>
</html>
