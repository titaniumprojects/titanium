<body>
    <div class="admin-card">
        <h2>ADMIN PANEL</h2>
        <input type="text" id="target" placeholder="Логин">
        <input type="number" id="bal" value="0">
        <button onclick="give()">ВЫДАТЬ</button>
    </div>

    <script src="config.js"></script>
    <script>
        async function give() {
            const target = document.getElementById('target').value.trim();
            const balance = document.getElementById('bal').value;
            await fetch(`${API}/api/admin/give`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ target, balance })
            });
            alert("Готово");
        }
    </script>
</body>
