<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Главная</title>
    <style>
        body { background: #05050a; color: white; font-family: sans-serif; padding: 50px; text-align: center; }
        .card { background: #0c0c14; padding: 30px; border-radius: 20px; border: 1px solid #1a1a2e; display: inline-block; min-width: 300px; }
        .user-info { margin-bottom: 20px; font-size: 1.2rem; }
        .btn { display: block; padding: 12px; background: #5f6eff; color: white; text-decoration: none; border-radius: 8px; margin-top: 10px; }
        .logout { color: #ff4d4d; text-decoration: none; font-size: 0.8rem; margin-top: 20px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h1>TITANIUM PROJECT</h1>
        <div class="user-info">
            Добро пожаловать, <span id="display-name" style="color: #5f6eff;">...</span>!
        </div>
        <p>Баланс: <span id="balance">0</span>₽</p>
        <a href="purchase.html" class="btn">Пополнить баланс</a>
        <a href="#" onclick="logout()" class="logout">Выйти из аккаунта</a>
    </div>

    <script>
        // 1. ЗАЩИТА: Если не залогинен — уходим на страницу логина
        const user = localStorage.getItem('username');
        if (!user) {
            window.location.href = "login.html";
        }

        document.getElementById('display-name').innerText = user;

        // 2. ЗАГРУЗКА ДАННЫХ С СЕРВЕРА
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
        
        async function loadData() {
            try {
                // Используем логин для получения инфо (можно сделать отдельный эндпоинт, 
                // но пока берем из того что сервер прислал бы при входе)
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: "" }) // Сервер вернет данные если юзер в базе
                });
                const data = await res.json();
                if (data.balance !== undefined) {
                    document.getElementById('balance').innerText = data.balance;
                }
            } catch (e) { console.log("Ошибка обновления баланса"); }
        }

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        loadData();
    </script>
</body>
</html>
