<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITANIUM | Dashboard</title>
    <style>
        :root { --bg: #05050a; --card: #0c0c14; --primary: #5f6eff; --text: #ffffff; --accent: #4caf50; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .container { width: 90%; max-width: 400px; }

        /* Карточка профиля */
        .profile-card { background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid #1a1a2e; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        
        .profile-card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, transparent, var(--primary), transparent); }

        .user-avatar { width: 80px; height: 80px; background: #1a1a2e; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 2px solid var(--primary); }

        h1 { margin: 10px 0; font-size: 1.5rem; letter-spacing: 1px; }
        .status { font-size: 0.8rem; color: var(--primary); text-transform: uppercase; font-weight: bold; margin-bottom: 20px; display: block; }

        /* Баланс */
        .balance-box { background: #141421; padding: 20px; border-radius: 16px; margin: 20px 0; border: 1px dashed #333; }
        .balance-label { font-size: 0.8rem; color: #888; display: block; margin-bottom: 5px; }
        .balance-amount { font-size: 2rem; font-weight: bold; color: var(--accent); }

        /* Кнопки */
        .menu { display: grid; gap: 10px; }
        .btn { padding: 14px; border-radius: 12px; text-decoration: none; font-weight: bold; transition: 0.3s; text-align: center; font-size: 0.9rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #4a56d4; transform: translateY(-2px); }
        .btn-outline { border: 1px solid #333; color: #ccc; }
        .btn-outline:hover { border-color: var(--primary); color: white; }

        .logout-btn { margin-top: 25px; color: #ff4d4d; font-size: 0.8rem; cursor: pointer; text-decoration: underline; background: none; border: none; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-card">
        <div class="user-avatar">👤</div>
        <h1 id="username-display">User</h1>
        <span class="status">Premium Access</span>

        <div class="balance-box">
            <span class="balance-label">ТЕКУЩИЙ БАЛАНС</span>
            <span class="balance-amount" id="balance-display">0₽</span>
        </div>

        <div class="menu">
            <a href="purchase.html" class="btn btn-primary">ПОПОЛНИТЬ СЧЕТ</a>
            <a href="store.html" class="btn btn-outline">МАГАЗИН ТОВАРОВ</a>
            <a href="settings.html" class="btn btn-outline">НАСТРОЙКИ</a>
        </div>

        <button class="logout-btn" onclick="logout()">Выйти из системы</button>
    </div>
</div>

<script>
    const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
    const user = localStorage.getItem('username');

    // 1. ЗАЩИТА: Если ника нет — выкидываем
    if (!user) {
        window.location.href = "login.html";
    } else {
        document.getElementById('username-display').innerText = user;
        updateData();
    }

    // 2. ОБНОВЛЕНИЕ ДАННЫХ С СЕРВЕРА
    async function updateData() {
        try {
            // Используем логин, чтобы получить актуальный баланс
            // В идеале можно сделать @app.get("/user/{username}")
            const res = await fetch(`${API}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: "" }) 
            });
            const data = await res.json();
            
            // Если сервер вернул баланс (даже если пароль пустой, мы просто берем инфу)
            if (data.balance !== undefined) {
                document.getElementById('balance-display').innerText = data.balance + "₽";
            }
        } catch (e) {
            console.error("Ошибка обновления данных");
        }
    }

    // 3. ВЫХОД
    function logout() {
        localStorage.removeItem('username');
        window.location.href = "login.html";
    }

    // Обновляем данные каждые 10 секунд (авто-баланс)
    setInterval(updateData, 10000);
</script>

</body>
</html>
