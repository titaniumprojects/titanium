<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Dashboard</title>
    <style>
        :root { --bg: #05050a; --card: #0c0c14; --primary: #5f6eff; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-top: 80px; display: flex; flex-direction: column; align-items: center; }
        .navbar { position: fixed; top: 0; width: 100%; height: 60px; background: #080810; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-bottom: 1px solid #1a1a2e; box-sizing: border-box; }
        .nav-links a { color: #888; text-decoration: none; margin-left: 20px; font-size: 0.8rem; }
        .nav-links a:hover { color: #fff; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #1a1a2e; text-align: center; width: 320px; }
        .balance { font-size: 2rem; color: #4caf50; margin: 20px 0; font-weight: bold; }
        .btn { display: block; width: 100%; padding: 12px; background: var(--primary); color: #fff; text-decoration: none; border-radius: 10px; margin-top: 10px; font-weight: bold; border: none; cursor: pointer; box-sizing: border-box; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div style="color: var(--primary); font-weight: bold;">TITANIUM</div>
        <div class="nav-links">
            <a href="home.html">ГЛАВНАЯ</a>
            <a href="store.html">МАГАЗИН</a>
            <a href="purchase.html">ПОПОЛНЕНИЕ</a>
            <a href="settings.html">НАСТРОЙКИ</a>
        </div>
    </nav>
    <div class="card">
        <h2 id="u-name">---</h2>
        <div class="balance" id="u-bal">0₽</div>
        <a href="purchase.html" class="btn">ПОПОЛНИТЬ</a>
        <a href="admin.html" id="adm-btn" class="btn" style="background:#ff4b4b; display:none;">АДМИН ПАНЕЛЬ</a>
    </div>
    <script>
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
        const user = localStorage.getItem('username');
        if(!user) window.location.href="login.html";
        document.getElementById('u-name').innerText = user;

        async function load() {
            const r = await fetch(`${API}/login`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username:user, password:""})});
            const d = await r.json();
            document.getElementById('u-bal').innerText = d.balance + "₽";
            if(d.is_admin) document.getElementById('adm-btn').style.display = "block";
        }
        load();
    </script>
</body>
</html>
