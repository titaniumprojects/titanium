<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Dashboard</title>
    <style>
        :root { --bg: #05050a; --card: #0c0c14; --primary: #5f6eff; --border: #1a1a2e; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 60px 1fr; height: 100vh; }
        
        /* Header */
        .header { grid-column: 1 / -1; background: #080810; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; }
        .nav-l, .nav-r { display: flex; gap: 10px; }
        .header a { color: #888; text-decoration: none; padding: 8px 15px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; transition: 0.3s; }
        .header a:hover { color: #fff; border-color: var(--primary); }

        /* Sidebar */
        .sidebar { background: var(--card); border-right: 1px solid var(--border); padding: 20px; }
        .profile-card { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        
        /* Rainbow Button */
        .rainbow-btn { 
            background: linear-gradient(90deg, #ff0000, #ff7f00, #00ff00, #0000ff, #8b00ff); 
            background-size: 400%; animation: rb 5s linear infinite; border: none; 
            padding: 12px; border-radius: 10px; color: white; font-weight: 900; cursor: pointer; width: 100%; margin-top: 15px;
        }
        @keyframes rb { 0%{background-position:0%} 100%{background-position:400%} }

        /* Roulette Modal */
        #roulette-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center; flex-direction:column; }
        .tape-container { width: 600px; height: 150px; overflow: hidden; border: 2px solid var(--primary); position: relative; background: #000; border-radius: 10px; }
        .tape { display: flex; transition: 5s cubic-bezier(0.1, 0, 0.1, 1); }
        .prize-box { min-width: 150px; height: 150px; border: 1px solid #111; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-direction: column; }
        .line { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: red; z-index: 10; box-shadow: 0 0 10px red; }
    </style>
</head>
<body>
    <div class="header">
        <div class="nav-l">
            <a href="forum.html">ФОРУМ</a>
            <a href="market.html">МАРКЕТПЛЕЙС</a>
            <a href="store.html">МАГАЗИН</a>
        </div>
        <div class="nav-r">
            <a href="admin.html" id="adm-btn" style="display:none; color:#ff4b4b;">ADMIN PANEL</a>
            <a href="settings.html">Настройки</a>
            <a href="#" onclick="logout()">Выход</a>
        </div>
    </div>

    <div class="sidebar">
        <div class="profile-card">
            <div id="nick" style="font-size: 18px; font-weight: bold; color: var(--primary);">User</div>
            <div id="role" style="font-size: 11px; color: #555; margin-bottom: 10px;">MEMBER</div>
            <div style="font-size: 13px;">Баланс: <span id="bal" style="color: #4caf50;">0₽</span></div>
            <div style="font-size: 13px;">Подписка: <span id="sub" style="color: #888;">None</span></div>
        </div>
        <button class="rainbow-btn" onclick="openR()">ROULETTE</button>
    </div>

    <div id="roulette-modal">
        <h2 style="letter-spacing: 3px;">DAILY CASE</h2>
        <div class="tape-container">
            <div class="line"></div>
            <div id="tape" class="tape"></div>
        </div>
        <button id="spin-btn" onclick="startSpin()" style="margin-top:30px; padding: 15px 40px; background: var(--primary); border:none; color:white; border-radius:8px; cursor:pointer; font-weight:bold;">КРУТИТЬ</button>
        <div style="margin-top:20px; font-size:12px; color:#444; text-align:center;">
            Шансы: Ничего (60%) | Промо (15%) | Деньги (20%) | Саб (4.5%) | Админка (0.1%)
        </div>
        <button onclick="document.getElementById('roulette-modal').style.display='none'" style="background:none; border:none; color:grey; margin-top:15px; cursor:pointer;">Закрыть</button>
    </div>

    <script>
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
        const user = localStorage.getItem('username');
        if(!user) location.href = "login.html";

        async function sync() {
            const r = await fetch(`${API}/login`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:user, password:""})});
            const d = await r.json();
            document.getElementById('nick').innerText = user;
            document.getElementById('bal').innerText = d.balance + "₽";
            document.getElementById('sub').innerText = d.subscription;
            if(d.is_admin) {
                document.getElementById('adm-btn').style.display = "block";
                document.getElementById('role').innerText = "ADMINISTRATOR";
                document.getElementById('role').style.color = "#ff4b4b";
            }
        }

        function openR() { document.getElementById('roulette-modal').style.display='flex'; }

        async function startSpin() {
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            const r = await fetch(`${API}/api/spin`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:user})});
            const data = await r.json();
            if(data.status === "error") return alert(data.message);

            const tape = document.getElementById('tape');
            tape.innerHTML = "";
            for(let i=0; i<60; i++) {
                const div = document.createElement('div');
                div.className = "prize-box";
                div.style.background = `hsl(${Math.random()*360}, 20%, 15%)`;
                div.innerHTML = `<span style="font-size:10px; color:grey;">ITEM #${i}</span><br>???`;
                tape.appendChild(div);
            }
            tape.style.transition = "none";
            tape.style.transform = "translateX(0)";
            
            setTimeout(() => {
                tape.style.transition = "5s cubic-bezier(0.1, 0, 0.1, 1)";
                tape.style.transform = "translateX(-7500px)";
            }, 50);

            setTimeout(() => {
                alert("РЕЗУЛЬТАТ: " + data.message);
                location.reload();
            }, 5500);
        }

        function logout() { localStorage.clear(); location.href="login.html"; }
        sync();
    </script>
</body>
</html>
