<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Dashboard</title>
    <style>
        :root { --bg: #05050a; --card: #0c0c14; --primary: #5f6eff; --border: #1a1a2e; }
        body { 
            background: var(--bg); color: white; font-family: sans-serif; margin: 0; 
            display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 60px 1fr; height: 100vh; 
        }
        
        .header { 
            grid-column: 1 / -1; background: #080810; border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: flex-end; padding: 0 25px; gap: 15px;
        }
        .header a { color: #888; text-decoration: none; padding: 7px 15px; border: 1px solid var(--border); border-radius: 5px; font-size: 12px; }
        .header a:hover { color: white; border-color: var(--primary); }

        .sidebar { 
            background: var(--card); border-right: 1px solid var(--border); padding: 20px; 
            display: flex; flex-direction: column; gap: 15px; 
        }
        .info-box { border: 1px solid var(--border); padding: 15px; border-radius: 10px; background: rgba(0,0,0,0.2); }
        .label { color: #444; font-size: 10px; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .val { font-size: 14px; margin-bottom: 12px; color: #ccc; }
        
        .content { display: flex; align-items: center; justify-content: center; padding: 40px; }
        .loader-card { 
            border: 1px solid var(--border); padding: 50px; border-radius: 20px; text-align: center; background: var(--card);
            width: 350px; box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .dl-btn { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; }

        #adm-btn { display: none; background: #ff4b4b; color: white; text-decoration: none; text-align: center; padding: 10px; border-radius: 5px; font-size: 12px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="settings.html">Настройки</a>
        <a href="home.html" style="color:white;">Главная</a>
        <a href="store.html">Приобрести</a>
        <a href="#" onclick="logout()" style="border-color:#ff4b4b; color:#ff4b4b;">Выход</a>
    </div>

    <div class="sidebar">
        <div class="info-box">
            <div class="label">Пользователь</div>
            <div class="val" id="nick" style="color:white; font-weight:bold;">Загрузка...</div>
            <div class="label">Баланс</div>
            <div class="val" id="bal" style="color:#4caf50; font-weight:bold;">0₽</div>
            <a href="admin.html" id="adm-btn">АДМИН ПАНЕЛЬ</a>
        </div>
        <div class="info-box">
            <div class="label">UID</div><div class="val" id="uid">#---</div>
            <div class="label">Роль</div><div class="val" id="role" style="color:var(--primary);">User</div>
            <div class="label">HWID</div><div class="val" style="font-size:10px; opacity:0.5;">A1-B2-C3-D4-E5</div>
        </div>
    </div>

    <div class="content">
        <div class="loader-card">
            <div style="font-size: 40px; margin-bottom: 20px;">💠</div>
            <h3 style="margin-bottom: 20px;">TITANIUM LOADER</h3>
            <button class="dl-btn" onclick="alert('Скачивание...')">СКАЧАТЬ</button>
        </div>
    </div>

    <script>
        const API = "https://new-bears-glow.loca.lt";
        const user = localStorage.getItem('username');
        if(!user) location.href = "login.html";

        async function sync() {
            try {
                const r = await fetch(`${API}/login`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: user, password: ""})
                });
                const d = await r.json();
                
                document.getElementById('nick').innerText = user;
                document.getElementById('bal').innerText = d.balance + "₽";
                
                if(d.is_admin) {
                    document.getElementById('adm-btn').style.display = "block";
                    document.getElementById('role').innerText = (user.toLowerCase() === "cold1ng") ? "DEV A" : "ADMIN";
                    document.getElementById('role').style.color = "#ff4b4b";
                    document.getElementById('uid').innerText = "#1";
                } else {
                    document.getElementById('uid').innerText = "#105";
                }
            } catch(e) { console.log("Offline"); }
        }
        function logout() { localStorage.clear(); location.href="login.html"; }
        sync();
    </script>
</body>
</html>
