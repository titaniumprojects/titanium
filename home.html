<script>
const API = "http://127.0.0.1:8000";
const user = localStorage.getItem('username');

if (!user) window.location.href = "login.html";

document.getElementById('user-display').innerText = user;
document.getElementById('avatar-init').innerText = user[0].toUpperCase();

async function sync() {
    try {
        const res = await fetch(`${API}/login`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: user, password: ""})
        });

        const data = await res.json();

        document.getElementById('stat-bal').innerText = (data.balance || 0) + " ₽";

        loadMarket(data.purchases || []);
    } catch(e) {}
}

async function loadMarket(purchases) {
    const r = await fetch(`${API}/api/market`);
    const items = await r.json();

    const list = document.getElementById('market-list');

    list.innerHTML = items.map(i => `
        <div class="product-card">
            <div>${i.title}</div>
            <div>${i.desc}</div>
            <div>${i.price} ₽</div>
            <button ${purchases.includes(i.id) ? 'disabled' : `onclick="buy('${i.id}')"`}>
                ${purchases.includes(i.id) ? 'КУПЛЕНО' : 'КУПИТЬ'}
            </button>
        </div>
    `).join('');
}

async function buy(id) {
    const r = await fetch(`${API}/api/market/buy`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: user, item_id: id})
    });

    const d = await r.json();
    alert(d.message || "OK");
    sync();
}

// --- РУЛЕТКА ---

const rewards = ["10 ₽","50 ₽","100 ₽","5 ₽","20 ₽"];
const track = document.getElementById('track');

function initTrack() {
    track.innerHTML = '';
    for(let i=0;i<60;i++){
        const div = document.createElement('div');
        div.className='item';
        div.innerText = rewards[Math.floor(Math.random()*rewards.length)];
        track.appendChild(div);
    }
}

async function spin(){
    const btn = document.getElementById('spinBtn');
    btn.disabled = true;

    initTrack();

    track.style.transition='transform 6s cubic-bezier(0.1,0,0.1,1)';
    track.style.transform='translateX(-3000px)';

    let result;

    try {
        const res = await fetch(`${API}/api/roulette/spin`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({username:user})
        });

        result = await res.json();

        if(result.status !== "success"){
            alert(result.message);
            btn.disabled = false;
            return;
        }

    } catch(e){
        alert("Ошибка сервера");
        btn.disabled = false;
        return;
    }

    setTimeout(()=>{
        alert("Вы выиграли: " + result.win);
        sync();
    },6000);
}

function logout(){
    localStorage.removeItem('username');
    location.href="login.html";
}

initTrack();
sync();
</script>
