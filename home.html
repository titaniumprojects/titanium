<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Dashboard</title>
    <style>
        :root { --bg: #05050a; --card: #0c0c14; --primary: #5f6eff; --border: #1a1a2e; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 60px 1fr; height: 100vh; overflow: hidden; }
        
        .header { grid-column: 1 / -1; background: #080810; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; }
        .nav-links a { color: #888; text-decoration: none; padding: 8px 15px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; margin-right: 10px; }
        .nav-links a:hover { color: white; border-color: var(--primary); }

        .sidebar { background: var(--card); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .sidebar h2 { font-size: 22px; margin: 0 0 10px 0; color: var(--primary); letter-spacing: 2px; }
        .info-block { font-size: 13px; color: #666; margin-bottom: 5px; }
        .info-block span { color: #fff; float: right; font-weight: bold; }

        .main-layout { display: grid; grid-template-columns: 1fr 380px; gap: 20px; padding: 20px; height: 100%; overflow: hidden; }

        /* Маркетплейс */
        .content-area { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; overflow-y: auto; }
        .market-card { background: #11111d; border: 1px solid #1a1a2e; padding: 15px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .market-card b { color: var(--primary); }

        /* Чат (Форум) */
        .chat-area { background: var(--card); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; height: 100%; }
        .chat-header { padding: 15px; border-bottom: 1px solid var(--border); font-weight: bold; font-size: 14px; color: var(--primary); }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .m-item { font-size: 13px; background: rgba(255,255,255,0.02); padding: 8px; border-radius: 6px; border-left: 2px solid #333; }
        .m-item.admin { border-left-color: #ff4b4b; background: rgba(255, 75, 75, 0.05); }
        .m-item b { font-size: 11px; display: block; margin-bottom: 3px; }
        .chat-input { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .chat-input input { flex: 1; background: #05050a; border: 1px solid #333; color: white; padding: 10px; border-radius: 6px; }
        .chat-input button { background: var(--primary); border: none; color: white; padding: 0 15px; border-radius: 6px; cursor: pointer; }

        .rainbow-btn { 
            background: linear-gradient(90deg, #ff0000, #ff7f00, #00ff00, #0000ff, #8b00ff); 
            background-size: 400%; animation: rb 5s linear infinite; border: none; 
            padding: 12px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        @keyframes rb { 0%{background-position:0%} 100%{background-position:400%} }
        
        #roulette-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center; }
    </style>
</head>
<body>
    <div class="header">
        <div class="nav-links">
            <a href="store.html">STORE</a>
            <a href="purchase.html" style="border-color:#4caf50; color:#4caf50;">ПОПОЛНИТЬ</a>
        </div>
        <div>
            <a href="admin.html" id="adm-btn" style="display:none; color:#ff4b4b; border-color:#ff4b4b;">ADMIN</a>
            <a href="settings.html">Настройки</a>
            <a href="#" onclick="logout()" style="border:none; color:#555;">Выйти</a>
        </div>
    </div>

    <div class="sidebar">
        <h2>TITANIUM</h2>
        <div class="info-block">UID: <span id="u-uid">...</span></div>
        <div class="info-block">ROLE: <span id="u-role">...</span></div>
        <div class="info-block">HWID: <span id="u-hwid">...</span></div>
        <div class="info-block">BALANCE: <span id="u-bal" style="color:#4caf50;">0₽</span></div>
        <div class="info-block">SUBSCRIBE: <span id="u-sub">NONE</span></div>
        <button class="rainbow-btn" onclick="document.getElementById('roulette-modal').style.display='flex'">DAILY ROULETTE</button>
    </div>

    <div class="main-layout">
        <div class="content-area">
            <h4 style="margin-top:0;">MARKETPLACE (CONFIGS & ACCOUNTS)</h4>
            <div id="market-list"></div>
        </div>

        <div class="chat-area">
            <div class="chat-header">COMMUNITY FORUM</div>
            <div class="chat-msgs" id="chat-msgs"></div>
            <div class="chat-input">
                <input type="text" id="m-text" placeholder="Написать в чат...">
                <button onclick="sendMsg()">></button>
            </div>
        </div>
    </div>

    <div id="roulette-modal">
        <div style="background:#0c0c14; padding:40px; border-radius:20px; border:1px solid var(--primary); text-align:center;">
            <h3>ЕЖЕДНЕВНЫЙ КЕЙС</h3>
            <button class="rainbow-btn" onclick="spin()">КРУТИТЬ БЕСПЛАТНО</button><br><br>
            <button onclick="document.getElementById('roulette-modal').style.display='none'" style="background:none; border:none; color:grey; cursor:pointer;">Закрыть</button>
        </div>
    </div>

    <script>
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
        const user = localStorage.getItem('username');
        if(!user) location.href = "login.html";

        async function sync() {
            const r = await fetch(`${API}/login`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:user, password:""})});
            const d = await r.json();
            document.getElementById('u-uid').innerText = "#" + d.uid;
            document.getElementById('u-role').innerText = d.is_admin ? "ADMIN" : "USER";
            document.getElementById('u-hwid').innerText = d.hwid;
            document.getElementById('u-bal').innerText = d.balance + "₽";
            document.getElementById('u-sub').innerText = d.subscription;
            if(d.is_admin) document.getElementById('adm-btn').style.display = "inline";
            loadMarket();
        }

        async function loadChat() {
            const r = await fetch(`${API}/api/chat`);
            const msgs = await r.json();
            document.getElementById('chat-msgs').innerHTML = msgs.map(m => `
                <div class="m-item ${m.is_admin ? 'admin' : ''}">
                    <b style="color:${m.is_admin ? '#ff4b4b' : '#5f6eff'}">${m.user} [${m.time}]</b>
                    ${m.text}
                </div>
            `).join('');
            const chatBox = document.getElementById('chat-msgs');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMsg() {
            const text = document.getElementById('m-text').value;
            if(!text) return;
            await fetch(`${API}/api/chat/send`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user, text})});
            document.getElementById('m-text').value = "";
            loadChat();
        }

        async function loadMarket() {
            const r = await fetch(`${API}/api/market`);
            const items = await r.json();
            document.getElementById('market-list').innerHTML = items.map(i => `
                <div class="market-card">
                    <div>
                        <b>${i.name}</b><br>
                        <small style="color:#555">Автор: ${i.author} | Категория: ${i.category}</small>
                    </div>
                    <div style="text-align:right">
                        <div style="color:#4caf50; font-weight:bold; margin-bottom:5px;">${i.price}₽</div>
                        <button onclick="alert('Покупка...') " style="background:#1a1a2e; border:1px solid #333; color:white; cursor:pointer; padding:5px 10px; border-radius:5px;">Купить</button>
                    </div>
                </div>
            `).join('');
        }

        async function spin() {
            const r = await fetch(`${API}/api/spin`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:user})});
            const d = await r.json();
            alert(d.message);
            if(d.status === "success") location.reload();
        }

        function logout() { localStorage.clear(); location.href="login.html"; }
        
        sync();
        loadChat();
        setInterval(loadChat, 4000);
    </script>
</body>
</html>
