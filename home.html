<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITANIUM | Dashboard</title>
    <style>
        :root {
            --bg: #05050a;
            --card: #0c0c14;
            --primary: #5f6eff;
            --primary-glow: rgba(95, 110, 255, 0.3);
            --border: #1a1a2e;
            --text-main: #ffffff;
            --text-dim: #888;
            --accent: #4caf50;
            --radius: 18px;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
            overflow: hidden;
        }

        /* Анимация появления */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Sidebar */
        .sidebar {
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 4px;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 0 15px var(--primary-glow);
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar {
            width: 70px;
            height: 70px;
            background: var(--primary);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .username { font-size: 18px; font-weight: 600; margin-bottom: 5px; }
        .balance-label { font-size: 12px; color: var(--text-dim); }
        .balance-value { font-size: 20px; color: var(--accent); font-weight: bold; }

        .nav-menu { display: flex; flex-direction: column; gap: 10px; flex: 1; }
        .nav-item {
            padding: 14px 18px;
            border-radius: 12px;
            color: var(--text-dim);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(95, 110, 255, 0.1);
            color: var(--primary);
            border-left: 3px solid var(--primary);
        }

        .admin-btn { color: #ff4b4b; border: 1px dashed #ff4b4b; display: none; margin-top: 10px; }

        /* Main Content */
        .main {
            padding: 40px;
            overflow-y: auto;
            animation: fadeIn 0.8s ease-out;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-box {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: var(--radius);
            position: relative;
            overflow: hidden;
        }

        .stat-box::before {
            content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary);
        }

        .stat-title { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 24px; font-weight: bold; margin-top: 10px; }

        .section-title { font-size: 22px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }

        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .product-img {
            width: 100%;
            height: 140px;
            background: #080810;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #222;
            font-weight: bold;
        }

        .buy-btn {
            background: var(--primary);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .buy-btn:disabled { background: #1a1a2e; color: #555; cursor: not-allowed; }

        .logout { color: #555; font-size: 13px; text-decoration: none; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">TITANIUM</div>
        
        <div class="profile-card">
            <div class="avatar" id="avatar-init">?</div>
            <div class="username" id="user-display">User</div>
            <div class="balance-label">Текущий баланс</div>
            <div class="balance-value" id="balance-side">0 ₽</div>
        </div>

        <nav class="nav-menu">
            <a href="home.html" class="nav-item active">🏠 Главная</a>
            <a href="store.html" class="nav-item">🛒 Магазин</a>
            <a href="roulette.html" class="nav-item">🎰 Рулетка</a>
            <a href="forum.html" class="nav-item">💬 Сообщество</a>
            <a href="purchase.html" class="nav-item">💳 Пополнение</a>
            <a href="settings.html" class="nav-item">⚙️ Настройки</a>
            <a href="admin.html" id="admin-link" class="nav-item admin-btn">🛠 Админ-панель</a>
        </nav>

        <a href="#" onclick="logout()" class="logout">Выйти из системы</a>
    </aside>

    <main class="main">
        <header class="section-title">
            <span>Обзор аккаунта</span>
            <span style="font-size: 14px; color: var(--text-dim);" id="current-date"></span>
        </header>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-title">Баланс</div>
                <div class="stat-value" id="stat-bal">0 ₽</div>
            </div>
            <div class="stat-box">
                <div class="stat-title">Активных дней</div>
                <div class="stat-value">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-title">Уровень доступа</div>
                <div class="stat-value" id="user-status">User</div>
            </div>
        </div>

        <div class="section-title">Доступные товары</div>
        <div class="market-grid" id="market-list">
            </div>
    </main>

    <script>
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
        const username = localStorage.getItem('username');

        // КРИТИЧЕСКАЯ ПРОВЕРКА АВТОРИЗАЦИИ
        if (!username) {
            window.location.href = "login.html";
        }

        document.getElementById('user-display').innerText = username;
        document.getElementById('avatar-init').innerText = username[0].toUpperCase();
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('ru-RU');

        async function sync() {
            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: username, password: ""})
                });
                const data = await res.json();
                
                if (data.status === "success") {
                    document.getElementById('balance-side').innerText = data.balance + " ₽";
                    document.getElementById('stat-bal').innerText = data.balance + " ₽";
                    
                    if (data.is_admin) {
                        document.getElementById('admin-link').style.display = "flex";
                        document.getElementById('user-status').innerText = "Administrator";
                        document.getElementById('user-status').style.color = "#ff4b4b";
                    }

                    loadMarket(data.purchases || []);
                }
            } catch(e) { console.error("Ошибка синхронизации"); }
        }

        async function loadMarket(purchases) {
            try {
                const r = await fetch(`${API}/api/market`);
                const items = await r.json();
                const list = document.getElementById('market-list');
                
                list.innerHTML = items.map(i => `
                    <div class="product-card">
                        <div class="product-img">TITANIUM SOFT</div>
                        <div class="product-body">
                            <h4 style="margin: 0 0 10px 0;">${i.title}</h4>
                            <p style="color: gray; font-size: 13px; margin-bottom: 15px;">${i.desc}</p>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span style="font-weight: bold; color: var(--accent);">${i.price} ₽</span>
                                <div style="width: 120px;">
                                    ${purchases.includes(i.id) 
                                        ? '<button class="buy-btn" disabled>КУПЛЕНО</button>' 
                                        : `<button class="buy-btn" onclick="buy('${i.id}')">КУПИТЬ</button>`}
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch(e) { console.error("Ошибка загрузки маркета"); }
        }

        async function buy(id) {
            if (!confirm("Вы уверены, что хотите приобрести этот товар?")) return;
            const r = await fetch(`${API}/api/market/buy`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: username, item_id: id})
            });
            const d = await r.json();
            if (d.status === "success") {
                alert("Поздравляем с покупкой!");
                sync();
            } else {
                alert(d.message || "Ошибка при покупке");
            }
        }

        function logout() {
            localStorage.removeItem('username');
            window.location.href = "login.html";
        }

        sync();
    </script>
</body>
</html>
