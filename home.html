<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Dashboard</title>
    <style>
        :root { 
            --bg: #05050a; 
            --card: #0c0c14; 
            --primary: #5f6eff; 
            --border: #1a1a2e; 
            --radius: 18px;
        }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: grid; 
            grid-template-columns: 280px 1fr; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Sidebar */
        .sidebar { 
            background: var(--card); 
            border-right: 1px solid var(--border); 
            padding: 30px 20px; 
            display: flex; 
            flex-direction: column; 
        }

        .profile-section {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), #a25fff);
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(95, 110, 255, 0.4);
        }

        .user-info h3 { margin: 0; font-size: 18px; letter-spacing: 1px; }
        .user-info p { color: #4caf50; font-weight: bold; margin: 5px 0 0; font-size: 14px; }

        .nav-menu { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .nav-item {
            padding: 14px 18px;
            border-radius: 12px;
            color: #888;
            text-decoration: none;
            transition: 0.3s;
            display: flex;
            align-items: center;
            font-weight: 500;
        }
        .nav-item:hover, .nav-item.active {
            background: #161625;
            color: white;
            border-left: 4px solid var(--primary);
        }

        /* Main */
        .main { padding: 30px; overflow-y: auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            text-align: center;
        }
        .stat-card span { color: #555; font-size: 12px; text-transform: uppercase; }
        .stat-card h2 { margin: 10px 0 0; color: var(--primary); }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .product-img {
            width: 100%;
            height: 160px;
            background: #11111f;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .product-body { padding: 20px; }
        .product-body h4 { margin: 0 0 10px; font-size: 18px; }
        .product-body p { color: #666; font-size: 13px; margin: 0 0 20px; height: 40px; }

        .btn-buy {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-buy:hover { background: #4a56d4; }

        .price-tag { color: #4caf50; font-size: 20px; font-weight: bold; margin-bottom: 15px; display: block; }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="profile-section">
            <div class="avatar" id="avatar-init">T</div>
            <div class="user-info">
                <h3 id="username">User</h3>
                <p id="balance">0.00 ₽</p>
            </div>
        </div>

        <nav class="nav-menu">
            <a href="#" class="nav-item active">Главная</a>
            <a href="store.html" class="nav-item">Магазин</a>
            <a href="roulette.html" class="nav-item">Рулетка</a>
            <a href="forum.html" class="nav-item">Сообщество</a>
            <a href="settings.html" class="nav-item">Настройки</a>
            <a href="admin.html" id="admin-btn" class="nav-item" style="display:none; color:#ff4b4b;">Админ-панель</a>
        </nav>

        <a href="#" onclick="logout()" class="nav-item" style="margin-top: auto; color: #555;">Выйти</a>
    </aside>

    <main class="main">
        <div class="header">
            <h2 style="letter-spacing: 1px;">TITANIUM DASHBOARD</h2>
            <div style="color: #444; font-size: 12px;" id="current-date"></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span>Ваш Баланс</span>
                <h2 id="stat-bal">0 ₽</h2>
            </div>
            <div class="stat-card">
                <span>Подписка</span>
                <h2 id="stat-sub" style="color: #4caf50;">ACTIVE</h2>
            </div>
            <div class="stat-card">
                <span>Дней осталось</span>
                <h2 id="stat-days">30</h2>
            </div>
        </div>

        <h3 style="margin-bottom: 20px;">ДОСТУПНЫЕ ТОВАРЫ</h3>
        <div class="product-grid" id="market-list">
            </div>
    </main>

    <script>
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
        const username = localStorage.getItem('username');

        if (!username) window.location.href = "login.html";

        document.getElementById('username').innerText = username;
        document.getElementById('avatar-init').innerText = username[0].toUpperCase();
        document.getElementById('current-date').innerText = new Date().toLocaleDateString();

        async function sync() {
            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: username, password: ""})
                });
                const data = await res.json();
                
                document.getElementById('balance').innerText = data.balance + " ₽";
                document.getElementById('stat-bal').innerText = data.balance + " ₽";
                
                if (data.is_admin) document.getElementById('admin-btn').style.display = "flex";

                loadMarket(data.purchases || []);
            } catch(e) { console.error("Sync error"); }
        }

        async function loadMarket(purchases) {
            const r = await fetch(`${API}/api/market`);
            const items = await r.json();
            const list = document.getElementById('market-list');
            
            list.innerHTML = items.map(i => `
                <div class="product-card">
                    <div class="product-img">IMAGE</div>
                    <div class="product-body">
                        <h4>${i.title}</h4>
                        <p>${i.desc}</p>
