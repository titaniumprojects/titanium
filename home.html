<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Home</title>
    <style>
        :root { --bg: #05050a; --card: #0c0c14; --primary: #5f6eff; --border: #1a1a2e; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
        .sidebar { background: var(--card); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .stat { background: #080810; padding: 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 13px; }
        .stat b { color: var(--primary); float: right; }
        .content { padding: 20px; overflow-y: auto; }
        .btn { background: var(--primary); border: none; color: white; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 5px; text-decoration: none; display: block; text-align: center; }
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color:var(--primary)">TITANIUM</h2>
        <div class="stat">User: <b id="u-name">...</b></div>
        <div class="stat">Balance: <b id="u-bal">0₽</b></div>
        <div class="stat">UID: <b id="u-uid">#0</b></div>
        <a href="forum.html" class="btn">ФОРУМ / ЧАТ</a>
        <a href="store.html" class="btn">МАГАЗИН</a>
        <a href="admin.html" id="admin-link" class="btn" style="background: #ff4b4b; display: none;">АДМИН ПАНЕЛЬ</a>
        <button class="btn" style="margin-top:auto; background:#333" onclick="logout()">ВЫЙТИ</button>
    </div>
    <div class="content">
        <h3>МАРКЕТПЛЕЙС</h3>
        <div id="market-list" class="market-grid"></div>
    </div>

    <script>
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
        const username = localStorage.getItem('username');

        if (!username) window.location.href = "login.html";

        async function sync() {
            try {
                const r = await fetch(`${API}/login`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: username, password: ""})
                });
                const d = await r.json();
                if (d.status === "error") return logout();

                document.getElementById('u-name').innerText = username;
                document.getElementById('u-bal').innerText = (d.balance || 0) + "₽";
                document.getElementById('u-uid').innerText = "#" + (d.uid || 0);
                
                if (d.is_admin) document.getElementById('admin-link').style.display = "block";

                loadMarket(d.purchases || []);
            } catch(e) { console.error("Ошибка сети"); }
        }

        async function loadMarket(purchases) {
            const r = await fetch(`${API}/api/market`);
            const items = await r.json();
            const list = document.getElementById('market-list');
            list.innerHTML = items.map(i => `
                <div class="item">
                    <h4>${i.title}</h4>
                    <p style="color:gray; font-size:12px">${i.desc}</p>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${i.price}₽</b>
                        ${purchases.includes(i.id) ? '<span>КУПЛЕНО</span>' : `<button onclick="buy('${i.id}')">КУПИТЬ</button>`}
                    </div>
                </div>
            `).join('');
        }

        async function buy(id) {
            const r = await fetch(`${API}/api/market/buy`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: username, item_id: id})
            });
            const d = await r.json();
            if (d.status === "success") sync(); else alert(d.message);
        }

        function logout() { localStorage.clear(); window.location.href = "login.html"; }
        sync();
    </script>
</body>
</html>
