<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Dashboard</title>
    <style>
        :root { --bg: #05050a; --card: #0c0c14; --primary: #5f6eff; --border: #1a1a2e; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: grid; grid-template-columns: 260px 1fr; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { background: var(--card); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .stat-box { background: #080810; padding: 12px; border-radius: 10px; border: 1px solid var(--border); font-size: 13px; }
        .stat-box b { color: var(--primary); float: right; }

        /* Main Content */
        .main { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .header-nav { display: flex; justify-content: flex-end; gap: 10px; }
        .header-nav a { color: #555; text-decoration: none; font-size: 12px; border: 1px solid var(--border); padding: 5px 12px; border-radius: 5px; }

        /* Market */
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .item img { width: 100%; height: 140px; object-fit: cover; border-bottom: 1px solid var(--border); }
        .item-body { padding: 15px; }
        
        .btn { background: var(--primary); border: none; color: white; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-buy { background: #4caf50; }
        .btn-dl { background: #f4b400; color: #000; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--primary); margin-bottom:20px;">TITANIUM</h2>
    <div class="stat-box">User: <b id="u-name">...</b></div>
    <div class="stat-box">Balance: <b id="u-bal">0₽</b></div>
    <div class="stat-box">UID: <b id="u-uid">#0</b></div>
    <button class="btn" style="margin-top:auto; background:#ff4b4b" onclick="logout()">ВЫЙТИ</button>
</div>

<div class="main">
    <div class="header-nav">
        <a href="#" onclick="sync()">ОБНОВИТЬ</a>
        <a href="settings.html">НАСТРОЙКИ</a>
    </div>

    <div id="status">Загрузка...</div>
    <div class="market-grid" id="market-list"></div>
</div>

<script>
    // ЗАМЕНИ НА СВОЙ АКТУАЛЬНЫЙ NGROK
    const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
    const user = localStorage.getItem('username');

    if (!user) window.location.href = "login.html";

    async function sync() {
        try {
            const r = await fetch(`${API}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: ""})
            });
            const d = await r.json();

            if (d.status === "error") {
                localStorage.clear();
                window.location.href = "login.html";
                return;
            }

            // Безопасное заполнение (исправляет белую страницу)
            document.getElementById('u-name').innerText = user;
            document.getElementById('u-bal').innerText = (d.balance ?? 0) + "₽";
            document.getElementById('u-uid').innerText = "#" + (d.uid ?? "0");

            loadMarket(d.purchases || []);
        } catch(e) {
            document.getElementById('status').innerText = "Ошибка сервера! Проверь Ngrok.";
        }
    }

    async function loadMarket(purchases) {
        const r = await fetch(`${API}/api/market`);
        const items = await r.json();
        const list = document.getElementById('market-list');
        document.getElementById('status').innerText = items.length ? "Маркетплейс:" : "Товаров пока нет.";

        list.innerHTML = items.map(i => `
            <div class="item">
                <img src="${i.img}">
                <div class="item-body">
                    <h4 style="margin:0">${i.title}</h4>
                    <p style="color:gray; font-size:12px; height:30px">${i.desc}</p>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px">
                        <b style="color:#4caf50">${i.price}₽</b>
                        <div style="width:100px">
                            ${purchases.includes(i.id) 
                                ? `<button class="btn btn-dl" onclick="window.open('${i.file_url}')">DOWNLOAD</button>`
                                : `<button class="btn btn-buy" onclick="buy('${i.id}')">BUY</button>`
                            }
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function buy(id) {
        const r = await fetch(`${API}/api/market/buy`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: user, item_id: id})
        });
        const d = await r.json();
        if(d.status === "success") sync(); else alert(d.message);
    }

    function logout() { localStorage.clear(); window.location.href = "login.html"; }

    sync();
</script>

</body>
</html>
