<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITANIUM | Dashboard</title>
    <style>
        :root {
            --bg: #05050a;
            --card: #0c0c14;
            --primary: #5f6eff;
            --primary-glow: rgba(95, 110, 255, 0.3);
            --border: #1a1a2e;
            --text-main: #ffffff;
            --text-dim: #888;
            --accent: #4caf50;
            --radius: 18px;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 4px;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 15px var(--primary-glow);
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .avatar {
            width: 65px; height: 65px;
            background: var(--primary);
            border-radius: 50%;
            margin: 0 auto 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; font-weight: bold;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .status-container { display: flex; flex-direction: column; gap: 8px; text-align: left; margin-top: 10px; }
        .status-item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 10px;
            display: flex; justify-content: space-between; font-size: 12px;
        }

        .nav-menu { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .nav-item {
            padding: 12px 15px;
            border-radius: 12px;
            color: var(--text-dim);
            text-decoration: none;
            display: flex; align-items: center; gap: 12px; font-weight: 500;
        }
        .nav-item:hover, .nav-item.active { background: rgba(95, 110, 255, 0.1); color: var(--primary); }

        /* Main Content */
        .main {
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
            background: radial-gradient(circle at top right, #0a0a1a, transparent);
        }

        /* Roulette UI */
        .roulette-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            position: relative;
        }

        .roulette-viewport {
            width: 100%;
            height: 80px;
            background: #05050a;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 15px;
        }

        .pointer {
            position: absolute;
            top: 0; left: 50%;
            width: 3px; height: 100%;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            z-index: 5;
            transform: translateX(-50%);
        }

        .track {
            display: flex;
            position: absolute;
            left: 0; top: 0;
            height: 100%;
            will-change: transform;
        }

        .item {
            min-width: 120px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-right: 1px solid #1a1a2e;
            font-size: 14px;
            background: linear-gradient(180deg, #0c0c14, #08080f);
        }

        .spin-btn {
            background: var(--primary);
            border: none; color: white;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            display: block; margin: 0 auto;
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .spin-btn:disabled { background: #1a1a2e; color: #555; cursor: not-allowed; box-shadow: none; }

        .logout { color: #444; font-size: 12px; text-align: center; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">TITANIUM</div>
        
        <div class="profile-card">
            <div class="avatar" id="avatar-init">?</div>
            <div class="username" id="user-display">Loading...</div>
            
            <div class="status-container">
                <div class="status-item">
                    <span style="color:var(--text-dim)">Subscription</span>
                    <span style="color:var(--accent)" id="sub-status">Active</span>
                </div>
                <div class="status-item">
                    <span style="color:var(--text-dim)">Balance</span>
                    <span id="stat-bal">0 ₽</span>
                </div>
            </div>
        </div>

        <nav class="nav-menu">
            <a href="home.html" class="nav-item active">🏠 Главная</a>
            <a href="store.html" class="nav-item">🛒 Магазин</a>
            <a href="roulette.html" class="nav-item">🎰 Рулетка</a>
            <a href="forum.html" class="nav-item">💬 Сообщество</a>
            <a href="purchase.html" class="nav-item">💳 Пополнение</a>
            <a href="settings.html" class="nav-item">⚙️ Настройки</a>
            <a href="admin.html" id="admin-link" class="nav-item" style="display:none; color:#ff4b4b;">🛠 Админ-панель</a>
        </nav>

        <div onclick="logout()" class="logout">Выйти из системы</div>
    </aside>

    <main class="main">
        <section class="roulette-section">
            <h3 style="margin-top:0;">Ежедневный бонус</h3>
            <div class="roulette-viewport">
                <div class="pointer"></div>
                <div id="track" class="track"></div>
            </div>
            <button class="spin-btn" id="spinBtn" onclick="spin()">КРУТИТЬ БЕСПЛАТНО</button>
            <div id="cooldown" style="text-align:center; font-size:12px; color:var(--text-dim); margin-top:10px;"></div>
        </section>

        <div id="market-list" class="market-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
            </div>
    </main>

    <script>
        const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
        const username = localStorage.getItem('username');

        if (!username) window.location.href = "login.html";

        document.getElementById('user-display').innerText = username;
        document.getElementById('avatar-init').innerText = username[0].toUpperCase();

        const track = document.getElementById('track');
        const rewards = ["5₽", "10₽", "20₽", "50₽", "ULTRA", "10₽", "5₽", "100₽"];

        function initTrack() {
            track.innerHTML = '';
            for(let i=0; i<60; i++) {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = rewards[Math.floor(Math.random() * rewards.length)];
                track.appendChild(div);
            }
        }

        async function sync() {
            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: username, password: ""})
                });
                const data = await res.json();
                
                document.getElementById('stat-bal').innerText = (data.balance || 0) + " ₽";
                if (data.is_admin) document.getElementById('admin-link').style.display = "flex";
                
                // Подгрузка магазина (опционально, если нужно на главной)
                loadMarket(data.purchases || []);
            } catch(e) { console.error("Sync error"); }
        }

        async function loadMarket(purchases) {
            try {
                const r = await fetch(`${API}/api/market`);
                const items = await r.json();
                const list = document.getElementById('market-list');
                list.innerHTML = items.slice(0, 3).map(i => `
                    <div style="background:var(--card); padding:20px; border-radius:15px; border:1px solid var(--border);">
                        <div style="font-weight:bold; color:var(--primary);">${i.title}</div>
                        <div style="font-size:20px; margin:10px 0;">${i.price} ₽</div>
                        <button onclick="location.href='store.html'" style="width:100%; background:var(--border); border:none; color:white; padding:8px; border-radius:5px; cursor:pointer;">Смотреть</button>
                    </div>
                `).join('');
            } catch(e) {}
        }

        function checkCooldown() {
            const last = localStorage.getItem(`lastSpin_${username}`);
            const btn = document.getElementById('spinBtn');
            const cd = document.getElementById('cooldown');
            
            if(last) {
                const diff = Date.now() - parseInt(last);
                if(diff < 86400000) {
                    btn.disabled = true;
                    const hours = Math.ceil((86400000 - diff) / 3600000);
                    cd.innerText = `Бонус будет доступен через ${hours} ч.`;
                    return false;
                }
            }
            btn.disabled = false;
            cd.innerText = "Бонус готов!";
            return true;
        }

        async function spin() {
            const btn = document.getElementById('spinBtn');
            
            try {
                // 1. Запрос к серверу
                const response = await fetch(`${API}/api/roulette/spin`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: username })
                });
                const result = await response.json();

                if (result.status === "error") {
                    alert(result.message);
                    return;
                }

                // 2. Анимация
                btn.disabled = true;
                const winName = result.win; 
                const itemWidth = 121; 
                const winIndex = 45; 
                const offset = (winIndex * itemWidth) - (track.parentElement.offsetWidth / 2) + (itemWidth / 2);
                
                track.style.transition = 'none';
                track.style.transform = 'translateX(0)';
                initTrack();
                
                track.children[winIndex].innerText = winName;
                track.children[winIndex].style.color = "var(--primary)";

                setTimeout(() => {
                    track.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0.1, 1)';
                    track.style.transform = `translateX(-${offset + (Math.random()*40 - 20)}px)`;
                }, 50);

                // 3. Итог
                setTimeout(() => {
                    alert(`Поздравляем! Ваш выигрыш: ${winName}`);
                    localStorage.setItem(`lastSpin_${username}`, Date.now());
                    checkCooldown();
                    sync(); // Обновляем баланс в боковом меню
                }, 6500);

            } catch (e) {
                alert("Сервер недоступен");
            }
        }

        function logout() { localStorage.removeItem('username'); window.location.href = "login.html"; }

        initTrack();
        checkCooldown();
        sync();
    </script>
</body>
</html>
