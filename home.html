<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TITANIUM | Dashboard</title>
    <style>
        :root { --bg: #05050a; --card: #0c0c14; --primary: #5f6eff; --text: #ffffff; --nav: #080810; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-top: 80px; display: flex; flex-direction: column; align-items: center; }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: var(--nav); display: flex; align-items: center; justify-content: space-between; padding: 0 50px; box-sizing: border-box; border-bottom: 1px solid #1a1a2e; z-index: 1000; }
        .nav-logo { font-weight: bold; letter-spacing: 2px; color: var(--primary); }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { color: #888; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: white; }

        /* КОНТЕНТ */
        .profile-card { background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid #1a1a2e; text-align: center; width: 350px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .user-avatar { width: 70px; height: 70px; background: #1a1a2e; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--primary); font-size: 1.5rem; }
        .balance-box { background: #141421; padding: 15px; border-radius: 12px; margin: 20px 0; border: 1px dashed #333; }
        .balance-amount { font-size: 1.8rem; font-weight: bold; color: #4caf50; }
        
        .btn { display: block; width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; margin-top: 10px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">TITANIUM</div>
        <div class="nav-links">
            <a href="home.html" class="active">ГЛАВНАЯ</a>
            <a href="store.html">МАГАЗИН</a>
            <a href="purchase.html">ПОПОЛНЕНИЕ</a>
            <a href="settings.html">НАСТРОЙКИ</a>
        </div>
        <div id="nav-user" style="font-size: 0.8rem; color: #5f6eff;"></div>
    </nav>

    <div class="profile-card">
        <div class="user-avatar">👤</div>
        <h1 id="username-display">---</h1>
        <div class="balance-box">
            <span style="font-size: 0.7rem; color: #888; display: block;">БАЛАНС</span>
            <span class="balance-amount" id="balance-display">0₽</span>
        </div>
        <a href="purchase.html" class="btn">ПОПОЛНИТЬ</a>
    </div>

    <script>
        const user = localStorage.getItem('username');
        if (!user) window.location.href = "login.html";
        document.getElementById('username-display').innerText = user;
        document.getElementById('nav-user').innerText = user.toUpperCase();
        
        // Тут можно добавить fetch для обновления баланса
    </script>
</body>
</html>
