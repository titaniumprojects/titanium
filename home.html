<script>
    // 1. Укажи СВОЙ актуальный адрес Ngrok
    const API = "https://heptarchal-stanton-hemispheric.ngrok-free.dev";
    const user = localStorage.getItem('username');

    // Если в локальном хранилище пусто - на выход
    if(!user) { window.location.href = 'login.html'; }

    async function sync() {
        try {
            const r = await fetch(`${API}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: ""}) // Авто-проверка сессии
            });
            const d = await r.json();

            if(d.status === "error") {
                // Если сервер не знает этого юзера (база очищена), удаляем мусор и выходим
                localStorage.clear();
                window.location.href = 'login.html';
                return;
            }

            // Обновляем UI
            document.getElementById('u-uid').innerText = "#" + d.uid;
            document.getElementById('u-bal').innerText = d.balance + "₽";
            document.getElementById('u-hwid').innerText = d.hwid;
            
            loadMarket(d.purchases);
        } catch(e) {
            console.error("Ошибка связи с сервером");
        }
    }

    async function loadMarket(purchases = []) {
        const r = await fetch(`${API}/api/market`);
        const items = await r.json();
        const container = document.getElementById('market-list');
        
        if (items.length === 0) {
            container.innerHTML = "<p style='color:gray; padding:20px;'>Маркетплейс пуст. Создайте первый топик!</p>";
            return;
        }

        container.innerHTML = items.map(i => `
            <div class="topic">
                <img src="${i.img}">
                <div class="topic-content">
                    <div class="topic-title">${i.title}</div>
                    <div style="font-size:13px; color:#888;">${i.desc}</div>
                    <div class="topic-footer">
                        <span style="color:#4caf50; font-weight:bold;">${i.price}₽</span>
                        ${purchases.includes(i.id) ? 
                            `<button class="btn btn-dl" onclick="window.open('${i.file_url}')">СКАЧАТЬ</button>` :
                            `<button class="btn" onclick="buy('${i.id}')">КУПИТЬ</button>`
                        }
                    </div>
                </div>
            </div>
        `).join('');
    }

    // Запуск функций
    sync();
    loadChat(); // функция из предыдущего кода
    setInterval(loadChat, 5000);
</script>
